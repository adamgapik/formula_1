<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — календарь и результаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c12; color: #eef2ff; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .nav {
            background: #12141c; border-radius: 60px; padding: 12px 24px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 40px;
        }
        .nav a { color: #b4c8e0; text-decoration: none; font-weight: 600; padding: 8px 16px; border-radius: 40px; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; }
        .race-list {
            background: #12141c;
            border-radius: 28px;
            overflow: hidden;
        }
        .race-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #20232c;
            flex-wrap: wrap;
            gap: 8px;
        }
        .race-item:last-child { border-bottom: none; }
        .race-date {
            font-size: 13px;
            color: #8a9bb0;
            min-width: 100px;
        }
        .race-name {
            font-weight: 600;
            flex: 2;
        }
        .race-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 30px;
            background: #1e2028;
        }
        .status-completed {
            background: #0f1118;
            color: #5a6e84;
        }
        .status-upcoming {
            background: #2a2e3c;
            color: #b4c8e0;
        }
        .winner {
            font-size: 12px;
            color: #e10600;
            margin-left: 8px;
        }
        .footer { margin-top: 48px; text-align: center; padding: 24px; border-top: 1px solid #20232c; color: #6a85a5; }
        .loading { text-align: center; padding: 40px; color: #8a9bb0; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Главная</a>
        <a href="drivers.html">Гонщики</a>
        <a href="teams.html">Команды</a>
        <a href="calendar.html" class="active">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>

    <h2 style="margin-bottom: 20px;">📅 КАЛЕНДАРЬ СЕЗОНА 2026 + ПОБЕДИТЕЛИ</h2>
    <div class="race-list" id="calendar-list">
        <div class="loading">Загрузка расписания...</div>
    </div>
    <div class="footer">Список этапов обновляется из Ergast API. Результаты появляются через несколько часов после гонки.</div>
</div>

<script>
    // ========== ЗАГРУЗКА КАЛЕНДАРЯ И ПОБЕДИТЕЛЕЙ ==========
    const SEASON = 2026;
    const ERGAST_SCHEDULE = `https://api.jolpi.ca/ergast/f1/${SEASON}.json`;
    const ERGAST_RESULTS_BASE = `https://api.jolpi.ca/ergast/f1/${SEASON}`;

    async function fetchCalendar() {
        const container = document.getElementById('calendar-list');
        if (!container) return;
        
        try {
            // 1. Загружаем расписание всех гонок
            const scheduleResp = await fetch(ERGAST_SCHEDULE);
            if (!scheduleResp.ok) throw new Error(`HTTP ${scheduleResp.status}`);
            const scheduleData = await scheduleResp.json();
            
            const races = scheduleData?.MRData?.RaceTable?.Races;
            if (!races || races.length === 0) {
                container.innerHTML = '<div class="loading">Нет данных о календаре</div>';
                return;
            }
            
            container.innerHTML = '';
            const now = new Date();
            
            for (let race of races) {
                const raceDate = new Date(race.date);
                const isPast = raceDate < now;
                const round = race.round;
                const raceName = race.raceName;
                const circuit = race.Circuit.circuitName;
                const dateStr = raceDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
                
                let winnerText = '';
                let statusClass = 'status-upcoming';
                let statusText = '🏁 предстоящий';
                
                // 2. Если гонка уже прошла — загружаем победителя
                if (isPast) {
                    try {
                        const resultResp = await fetch(`${ERGAST_RESULTS_BASE}/${round}/results.json`);
                        if (resultResp.ok) {
                            const resultData = await resultResp.json();
                            const results = resultData?.MRData?.RaceTable?.Races?.[0]?.Results;
                            if (results && results.length > 0) {
                                const winner = results[0];
                                const winnerName = `${winner.Driver.givenName} ${winner.Driver.familyName}`;
                                winnerText = `<span class="winner">🏆 победитель: ${winnerName}</span>`;
                            }
                        }
                    } catch (e) {
                        // если результат не загрузился — просто пропускаем
                        console.warn(`Не удалось загрузить результат гонки ${round}`, e);
                    }
                    statusClass = 'status-completed';
                    statusText = '✅ завершён';
                }
                
                const raceDiv = document.createElement('div');
                raceDiv.className = 'race-item';
                raceDiv.innerHTML = `
                    <div class="race-date">${dateStr}</div>
                    <div class="race-name">${raceName}<br><span style="font-size: 12px; color:#6a85a5;">${circuit}</span></div>
                    <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
                        <span class="race-status ${statusClass}">${statusText}</span>
                        ${winnerText}
                    </div>
                `;
                container.appendChild(raceDiv);
            }
        } catch (error) {
            console.error('Ошибка загрузки календаря:', error);
            container.innerHTML = '<div class="loading">Ошибка загрузки данных. Попробуйте позже.</div>';
        }
    }
    
    fetchCalendar();
</script>
</body>
</html>
