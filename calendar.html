<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — календарь и результаты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #030507; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .nav {
            background: #0b0e14; border-radius: 80px; padding: 12px 28px; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-bottom: 48px; border: 1px solid rgba(225, 6, 0, 0.4);
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.2);
        }
        .nav a { color: #ccd6f0; text-decoration: none; font-weight: 700; padding: 8px 22px; border-radius: 40px; transition: 0.25s; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; box-shadow: 0 0 12px #e10600; }
        .race-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 50px; }
        .race-card {
            background: #0f121b; border-radius: 28px; border: 1px solid #1f2538; overflow: hidden;
            transition: 0.2s; backdrop-filter: blur(2px);
        }
        .race-card:hover { transform: translateY(-5px); border-color: #e10600; box-shadow: 0 20px 30px -12px rgba(225,6,0,0.3); }
        .race-header { background: #0a0d14; padding: 16px 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #1f2538; }
        .race-round { font-size: 12px; font-weight: 700; color: #e10600; background: rgba(225,6,0,0.15); padding: 4px 12px; border-radius: 40px; }
        .race-body { padding: 20px; }
        .race-name { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .race-circuit { font-size: 13px; color: #8f9eb2; margin-bottom: 16px; }
        .race-status { display: inline-flex; align-items: center; gap: 8px; background: #1a1e2a; padding: 5px 14px; border-radius: 40px; font-size: 12px; font-weight: 600; margin-top: 6px; }
        .status-upcoming { background: #1f2a3a; color: #ffb347; border-left: 3px solid #ffb347; }
        .status-completed { background: #0f1722; color: #6c86a3; }
        .winner-block { margin-top: 16px; padding-top: 12px; border-top: 1px dashed #2a3145; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; color: #e10600; }
        .footer { margin-top: 60px; text-align: center; padding: 24px; border-top: 1px solid #1a1f2c; color: #6c7a92; }
        @media (max-width: 768px) { .race-grid { grid-template-columns: 1fr; } .nav a { padding: 6px 14px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Главная</a>
        <a href="drivers.html">Гонщики</a>
        <a href="teams.html">Команды</a>
        <a href="calendar.html" class="active">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>
    <div class="race-grid" id="raceGridContainer"><div style="grid-column:1/-1; text-align:center; padding:60px;">ЗАГРУЗКА КАЛЕНДАРЯ...</div></div>
    <div class="footer">⚡ Данные из Ergast API — обновляются после каждой гонки</div>
</div>
<script>
    const SEASON = 2026;
    const BASE_URL = `https://api.jolpi.ca/ergast/f1/${SEASON}`;
    async function loadCalendar() {
        const container = document.getElementById('raceGridContainer');
        try {
            const scheduleRes = await fetch(`${BASE_URL}.json`);
            const scheduleData = await scheduleRes.json();
            const races = scheduleData?.MRData?.RaceTable?.Races || [];
            container.innerHTML = '';
            const now = new Date();
            for (let race of races) {
                const round = race.round;
                const raceDate = new Date(race.date);
                const isPast = raceDate < now;
                let winnerHtml = '';
                if (isPast) {
                    try {
                        const res = await fetch(`${BASE_URL}/${round}/results.json`);
                        if (res.ok) {
                            const resultData = await res.json();
                            const winner = resultData?.MRData?.RaceTable?.Races?.[0]?.Results?.[0];
                            if (winner) winnerHtml = `<div class="winner-block"><span>🏆</span> ПОБЕДИТЕЛЬ: ${winner.Driver.givenName} ${winner.Driver.familyName}</div>`;
                        }
                    } catch(e) {}
                }
                const card = document.createElement('div');
                card.className = 'race-card';
                card.innerHTML = `
                    <div class="race-header"><span class="race-round">ЭТАП ${round}</span><span>${raceDate.toLocaleDateString('ru-RU')}</span></div>
                    <div class="race-body">
                        <div class="race-name">${race.raceName}</div>
                        <div class="race-circuit">📍 ${race.Circuit.circuitName} · ${race.Circuit.Location?.country || ''}</div>
                        <div class="race-status ${isPast ? 'status-completed' : 'status-upcoming'}">${isPast ? '✅ ЗАВЕРШЁН' : '🏁 ПРЕДСТОЯЩИЙ'}</div>
                        ${winnerHtml}
                    </div>
                `;
                container.appendChild(card);
            }
        } catch(e) { container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">Ошибка загрузки календаря</div>'; }
    }
    loadCalendar();
</script>
</body>
</html>
