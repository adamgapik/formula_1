<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>F1 2026 — календарь и результаты | Red Bull Territory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #030507;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* навигация — как в болиде */
        .nav {
            background: #0b0e14;
            border-radius: 80px;
            padding: 12px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 48px;
            border: 1px solid rgba(225, 6, 0, 0.4);
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .nav a {
            color: #ccd6f0;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            padding: 8px 22px;
            border-radius: 40px;
            transition: 0.25s ease;
            letter-spacing: 0.5px;
        }

        .nav a.active, .nav a:hover {
            background: #e10600;
            color: white;
            box-shadow: 0 0 12px #e10600;
            text-shadow: 0 0 2px black;
        }

        /* заголовок с гоночным уклоном */
        .page-header {
            margin-bottom: 36px;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            border-left: 6px solid #e10600;
            padding-left: 20px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e10600);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: #9aaec0;
            font-size: 14px;
            font-weight: 500;
        }

        /* гоночная сетка — календарь в стиле F1 */
        .race-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 22px;
            margin-bottom: 50px;
        }

        .race-card {
            background: #0f121b;
            border-radius: 28px;
            border: 1px solid #1f2538;
            overflow: hidden;
            transition: 0.2s ease-in-out;
            backdrop-filter: blur(2px);
        }

        .race-card:hover {
            transform: translateY(-6px);
            border-color: #e10600;
            box-shadow: 0 20px 30px -12px rgba(225, 6, 0, 0.3);
        }

        .race-header {
            background: #0a0d14;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2538;
        }

        .race-round {
            font-size: 12px;
            font-weight: 700;
            color: #e10600;
            background: rgba(225, 6, 0, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
        }

        .race-date {
            font-size: 13px;
            font-weight: 500;
            color: #aab7c9;
        }

        .race-body {
            padding: 20px;
        }

        .race-name {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .race-circuit {
            font-size: 13px;
            color: #8f9eb2;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .race-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a1e2a;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
        }

        .status-upcoming {
            background: #1f2a3a;
            color: #ffb347;
            border-left: 3px solid #ffb347;
        }

        .status-completed {
            background: #0f1722;
            color: #6c86a3;
        }

        .winner-block {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px dashed #2a3145;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #e10600;
        }

        .winner-icon {
            font-size: 20px;
        }

        .footer {
            margin-top: 60px;
            text-align: center;
            padding: 24px;
            border-top: 1px solid #1a1f2c;
            font-size: 12px;
            color: #6c7a92;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }
            .race-grid {
                grid-template-columns: 1fr;
            }
            .page-header h1 {
                font-size: 26px;
            }
            .nav a {
                padding: 6px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Главная</a>
        <a href="drivers.html">Гонщики</a>
        <a href="teams.html">Команды</a>
        <a href="calendar.html" class="active">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>

    <div class="page-header">
        <h1>🗓️ КАЛЕНДАРЬ F1 2026</h1>
        <p>🔥 агрессивный сезон — 24 гонки, новая эра</p>
    </div>

    <div id="raceGridContainer" class="race-grid">
        <div style="text-align: center; grid-column: 1/-1; padding: 60px;">🏁 ЗАГРУЗКА ГОНОЧНЫХ ДАННЫХ... 🏁</div>
    </div>

    <div class="footer">
        ⚡ Данные из официального Ergast / Jolpica API — обновляются после каждой гонки<br>
        🐂 Red Bull Territory — готовься к Баку!
    </div>
</div>

<script>
    const SEASON = 2026;
    const BASE_URL = `https://api.jolpi.ca/ergast/f1/${SEASON}`;

    async function fetchCalendarFierce() {
        const container = document.getElementById('raceGridContainer');
        if (!container) return;
        try {
            // загружаем расписание
            const scheduleResp = await fetch(`${BASE_URL}.json`);
            if (!scheduleResp.ok) throw new Error(`HTTP ${scheduleResp.status}`);
            const scheduleData = await scheduleResp.json();
            const races = scheduleData?.MRData?.RaceTable?.Races;
            if (!races || races.length === 0) {
                container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Нет данных о календаре 2026</div>';
                return;
            }

            container.innerHTML = '';
            const now = new Date();

            for (let race of races) {
                const round = race.round;
                const raceName = race.raceName;
                const circuitName = race.Circuit.circuitName;
                const country = race.Circuit.Location?.country || '—';
                const raceDate = new Date(race.date);
                const isPast = raceDate < now;
                const formattedDate = raceDate.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

                let statusClass = 'status-upcoming';
                let statusText = '🏎️ ПРЕДСТОЯЩИЙ';
                let winnerHtml = '';

                if (isPast) {
                    // пробуем подтянуть победителя
                    try {
                        const resultResp = await fetch(`${BASE_URL}/${round}/results.json`);
                        if (resultResp.ok) {
                            const resultData = await resultResp.json();
                            const results = resultData?.MRData?.RaceTable?.Races?.[0]?.Results;
                            if (results && results.length > 0) {
                                const winner = results[0];
                                const winnerName = `${winner.Driver.givenName} ${winner.Driver.familyName}`;
                                winnerHtml = `
                                    <div class="winner-block">
                                        <span class="winner-icon">🏆</span>
                                        <span>ПОБЕДИТЕЛЬ: ${winnerName}</span>
                                    </div>
                                `;
                            }
                        }
                    } catch (e) {
                        console.warn(`winner not loaded for round ${round}`);
                    }
                    statusClass = 'status-completed';
                    statusText = '✅ ЗАВЕРШЁН';
                }

                const card = document.createElement('div');
                card.className = 'race-card';
                card.innerHTML = `
                    <div class="race-header">
                        <span class="race-round">ЭТАП ${round}</span>
                        <span class="race-date">${formattedDate}</span>
                    </div>
                    <div class="race-body">
                        <div class="race-name">${escapeHtml(raceName)}</div>
                        <div class="race-circuit">📍 ${escapeHtml(circuitName)} · ${escapeHtml(country)}</div>
                        <div class="race-status ${statusClass}">
                            <span>🏁</span> ${statusText}
                        </div>
                        ${winnerHtml}
                    </div>
                `;
                container.appendChild(card);
            }
        } catch (err) {
            console.error('Calendar load error:', err);
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">⚠️ Ошибка загрузки календаря. Попробуй позже.</div>';
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    fetchCalendarFierce();
</script>
</body>
</html>
