<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // CALENDAR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html" class="active">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html">GAMES</a>
    </div>
    <h1>📅 2026 RACE CALENDAR</h1>
    <div class="race-grid" id="calendarGrid"><div>⏳ LOADING</div></div>
    <div class="footer">WINNERS APPEAR AFTER GP</div>
</div>
<script>
    const SEASON = 2026;
    const BASE = `https://api.jolpi.ca/ergast/f1/${SEASON}`;
    async function loadCalendar() {
        const grid = document.getElementById('calendarGrid');
        try {
            const sched = await fetch(`${BASE}.json`);
            const data = await sched.json();
            const races = data?.MRData?.RaceTable?.Races || [];
            grid.innerHTML = '';
            const now = new Date();
            for (let r of races) {
                const raceDate = new Date(r.date);
                const isPast = raceDate < now;
                let winnerHtml = '';
                if (isPast) {
                    try {
                        const res = await fetch(`${BASE}/${r.round}/results.json`);
                        if (res.ok) {
                            const wdata = await res.json();
                            const win = wdata?.MRData?.RaceTable?.Races?.[0]?.Results?.[0];
                            if (win) winnerHtml = `<div class="winner">🏆 WINNER: ${win.Driver.givenName} ${win.Driver.familyName}</div>`;
                        }
                    } catch(e) {}
                }
                const card = document.createElement('div');
                card.className = 'race-card';
                card.innerHTML = `
                    <div class="race-header"><span>ROUND ${r.round}</span><span>${raceDate.toLocaleDateString('en-GB')}</span></div>
                    <div class="race-name">${r.raceName}</div>
                    <div>${isPast ? '✓ FINISHED' : '⏩ UPCOMING'}</div>
                    ${winnerHtml}
                `;
                grid.appendChild(card);
            }
        } catch(e) { grid.innerHTML = '<div>ERROR LOADING CALENDAR</div>'; }
    }
    loadCalendar();
</script>
</body>
</html>
