<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — гонщики (живые данные)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c12; color: #eef2ff; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .nav {
            background: #12141c; border-radius: 60px; padding: 12px 24px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 40px;
        }
        .nav a { color: #b4c8e0; text-decoration: none; font-weight: 600; padding: 8px 16px; border-radius: 40px; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; }
        .table-wrapper { overflow-x: auto; background: #12141c; border-radius: 28px; padding: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #20232c; }
        th { background: #1a1d2a; }
        .red-bull-row { background: rgba(225, 6, 0, 0.08); border-left: 3px solid #e10600; }
        .footer { margin-top: 48px; text-align: center; padding: 24px; border-top: 1px solid #20232c; color: #6a85a5; }
        .loading { text-align: center; padding: 40px; color: #8a9bb0; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Главная</a>
        <a href="drivers.html" class="active">Гонщики</a>
        <a href="teams.html">Команды</a>
        <a href="calendar.html">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>

    <h2 style="margin-bottom: 20px;">🏁 ЧЕМПИОНАТ ГОНЩИКОВ 2026 (обновляется с Ergast API)</h2>
    <div class="table-wrapper">
        <table id="drivers-table">
            <thead>
                <tr><th>Поз.</th><th>Гонщик</th><th>Команда</th><th>Победы</th><th>Очки</th></tr>
            </thead>
            <tbody id="drivers-tbody">
                <tr><td colspan="5" class="loading">Загрузка данных из API...</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer">Данные автоматически обновляются после каждой гонки через Ergast / Jolpica API. Актуально на 2026 год.</div>
</div>

<script>
    // ========== ВОТ СЮДА ВСТАВЛЯЕТСЯ ВЕСЬ КОД ==========
    // Код для загрузки данных о гонщиках из API
    const SEASON = 2026;
    const ERGAST_DRIVERS = `https://api.jolpi.ca/ergast/f1/${SEASON}/driverstandings.json`;

    async function fetchDrivers() {
        const tbody = document.getElementById('drivers-tbody');
        if (!tbody) return;
        
        try {
            const response = await fetch(ERGAST_DRIVERS);
            if (!response.ok) throw new Error(`Ошибка HTTP: ${response.status}`);
            const data = await response.json();
            
            const standingsList = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings;
            if (!standingsList || standingsList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">Нет данных о гонщиках</td></tr>';
                return;
            }
            
            tbody.innerHTML = '';
            standingsList.forEach((driver, idx) => {
                const row = tbody.insertRow();
                const pos = idx + 1;
                const givenName = driver.Driver.givenName || '';
                const familyName = driver.Driver.familyName || '';
                const fullName = `${givenName} ${familyName}`.trim();
                const teamName = driver.Constructors?.[0]?.name || '—';
                const wins = driver.wins || 0;
                const points = driver.points || 0;
                
                row.insertCell(0).innerText = pos;
                row.insertCell(1).innerText = fullName;
                row.insertCell(2).innerText = teamName;
                row.insertCell(3).innerText = wins;
                row.insertCell(4).innerText = points;
                
                if (teamName === 'Red Bull') {
                    row.classList.add('red-bull-row');
                }
            });
        } catch (error) {
            console.error('Ошибка загрузки данных гонщиков:', error);
            tbody.innerHTML = '<tr><td colspan="5">Ошибка соединения с API. Попробуйте позже.</td></tr>';
        }
    }
    
    fetchDrivers();
    // ========== КОНЕЦ КОДА ==========
</script>
</body>
</html>
