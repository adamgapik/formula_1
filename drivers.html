<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — Drivers Championship</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fc; color: #1a2c3e; padding: 24px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .nav {
            background: white; border-radius: 48px; padding: 12px 28px; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-bottom: 40px; border: 1px solid #e2e8f0;
        }
        .nav a { color: #1a2c3e; text-decoration: none; font-weight: 600; padding: 8px 22px; border-radius: 40px; transition: 0.2s; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; border-left: 4px solid #e10600; padding-left: 18px; }
        .table-wrapper { overflow-x: auto; background: white; border-radius: 24px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 14px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; color: #1e3c5c; }
        .footer { margin-top: 48px; text-align: center; padding: 24px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #5a6e84; }
        @media (max-width: 768px) { th, td { padding: 10px 8px; font-size: 13px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Standings</a>
        <a href="drivers.html" class="active">Drivers</a>
        <a href="teams.html">Teams</a>
        <a href="calendar.html">Calendar</a>
        <a href="news.html">News</a>
    </div>
    <h1>🏁 DRIVERS' CHAMPIONSHIP 2026</h1>
    <div class="table-wrapper">
        <table id="drivers-table">
            <thead><tr><th>Pos</th><th>Driver</th><th>Team</th><th>Wins</th><th>Points</th></tr></thead>
            <tbody id="drivers-tbody"><tr><td colspan="5">Loading data...</td></tr></tbody>
        </table>
    </div>
    <div class="footer">Data via Jolpica API · Updates automatically after each session</div>
</div>
<script>
    const SEASON = 2026;
    async function fetchDrivers() {
        const tbody = document.getElementById('drivers-tbody');
        try {
            const res = await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/driverstandings.json`);
            const data = await res.json();
            const standings = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || [];
            tbody.innerHTML = '';
            standings.forEach((d, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i+1;
                row.insertCell(1).innerText = `${d.Driver.givenName} ${d.Driver.familyName}`;
                row.insertCell(2).innerText = d.Constructors[0]?.name || '—';
                row.insertCell(3).innerText = d.wins;
                row.insertCell(4).innerText = d.points;
            });
        } catch(e) { tbody.innerHTML = '<tr><td colspan="5">Error loading data</td></tr>'; }
    }
    fetchDrivers();
</script>
</body>
</html>
