<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // DRIVERS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html" class="active">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html">GAMES</a>
    </div>
    <h1>🏁 DRIVERS CHAMPIONSHIP</h1>
    <div class="table-wrapper">
        <table id="driversTable">
            <thead><tr><th>POS</th><th>DRIVER</th><th>TEAM</th><th>WINS</th><th>POINTS</th></tr></thead>
            <tbody id="driversBody"><tr><td colspan="5">⏳ LOADING</td></tr></tbody>
        </table>
    </div>
    <div class="footer">LIVE FEED · UPDATED AUTOMATICALLY</div>
</div>
<script>
    const SEASON = 2026;
    async function loadDrivers() {
        const tbody = document.getElementById('driversBody');
        try {
            const res = await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/driverstandings.json`);
            const data = await res.json();
            const list = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings || [];
            tbody.innerHTML = '';
            list.forEach((d, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i + 1;
                row.insertCell(1).innerText = `${d.Driver.givenName} ${d.Driver.familyName}`;
                row.insertCell(2).innerText = d.Constructors[0]?.name || '—';
                row.insertCell(3).innerText = d.wins;
                row.insertCell(4).innerText = d.points;
            });
        } catch(e) { tbody.innerHTML = '<tr><td colspan="5">ERROR FETCHING DATA</td></tr>'; }
    }
    loadDrivers();
</script>
</body>
</html>
