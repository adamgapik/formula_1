<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // DRIVERS</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#03050a;font-family:'Inter',monospace;color:#eef2ff;padding:24px;}
        .container{max-width:1300px;margin:0 auto;}
        .nav{
            display:flex;flex-wrap:wrap;justify-content:center;gap:12px;
            margin-bottom:48px;padding:8px 24px;border-bottom:1px solid #ff003c;
            box-shadow:0 0 6px #ff003c;
        }
        .nav a{color:#b0c4de;text-decoration:none;font-weight:700;padding:8px 24px;letter-spacing:1px;}
        .nav a.active,.nav a:hover{background:#ff003c;color:#000;box-shadow:0 0 12px #ff003c;}
        h1{font-size:28px;font-weight:800;margin-bottom:28px;border-left:4px solid #00c8ff;padding-left:18px;text-shadow:0 0 5px #00c8ff;}
        .table-wrapper{overflow-x:auto;background:#0b0e14;border:1px solid #ff003c;padding:2px;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:16px 14px;text-align:left;border-bottom:1px solid #22262f;}
        th{background:#05070c;color:#00c8ff;font-weight:700;letter-spacing:1px;}
        .footer{margin-top:64px;padding:24px;text-align:center;border-top:1px solid #ff003c;font-size:11px;color:#6a7c94;}
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html" class="active">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
    </div>
    <h1>🏁 DRIVERS CHAMPIONSHIP</h1>
    <div class="table-wrapper">
        <table id="driversTable">
            <thead><tr><th>POS</th><th>DRIVER</th><th>TEAM</th><th>WINS</th><th>POINTS</th></tr></thead>
            <tbody id="driversBody"><tr><td colspan="5">⏳ LOADING</td></tr></tbody>
        </table>
    </div>
    <div class="footer">LIVE FEED · UPDATED AUTOMATICALLY</div>
</div>
<script>
    const SEASON=2026;
    async function loadDrivers(){
        const tbody=document.getElementById('driversBody');
        try{
            const res=await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/driverstandings.json`);
            const data=await res.json();
            const list=data?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings||[];
            tbody.innerHTML='';
            list.forEach((d,i)=>{
                const row=tbody.insertRow();
                row.insertCell(0).innerText=i+1;
                row.insertCell(1).innerText=`${d.Driver.givenName} ${d.Driver.familyName}`;
                row.insertCell(2).innerText=d.Constructors[0]?.name||'—';
                row.insertCell(3).innerText=d.wins;
                row.insertCell(4).innerText=d.points;
            });
        }catch(e){tbody.innerHTML='<tr><td colspan="5">ERROR FETCHING DATA</td></tr>';}
    }
    loadDrivers();
</script>
</body>
</html>
