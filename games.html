<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>F1 2026 // MINI GAMES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html" class="active">GAMES</a>
        <a href="simulator.html">SIMULATOR</a>
    </div>
    <h1>🎮 F1 MINI GAMES · 14 GAMES</h1>
    <div class="games-grid" id="gamesGrid"></div>
    <div class="footer">⚡ REACTION · MEMORY · TAPPING · QUIZ · ARCADE</div>
</div>
<script>
    const gamesGrid = document.getElementById('gamesGrid');
    function createGameCard(title, contentFn, id) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<div class="game-title">${title}</div><div id="${id}">loading...</div>`;
        gamesGrid.appendChild(card);
        const container = document.getElementById(id);
        if (container) contentFn(container);
    }
    // 14 игр (сокращённо, но полностью рабочие)
    const gamesList = [
        { title: '⏱️ REACTION PIT STOP', fn: (c) => { c.innerHTML = `<div>Click when light turns GREEN</div><div id="pitStatus" style="margin:12px 0;font-size:20px;font-weight:800;">🔴 WAITING</div><button id="pitBtn">START</button><div id="pitResult" class="game-stats"></div>`;
            let pt=null, ps=null, pa=false; const pb=document.getElementById('pitBtn'), pst=document.getElementById('pitStatus'), pr=document.getElementById('pitResult');
            pb.onclick=()=>{ if(pt) clearTimeout(pt); pa=true; ps=null; pst.innerHTML='🟢 GET READY...'; pr.innerHTML=''; const d=Math.random()*3000+1000; pt=setTimeout(()=>{ if(pa){ pst.innerHTML='🟢🟢 GO! CLICK NOW 🟢🟢'; ps=Date.now(); } },d); setTimeout(()=>{ if(pa && !ps){ pst.innerHTML='🔴 MISSED START'; pa=false; } },d+2000); };
            document.addEventListener('click',(e)=>{ if(pa && ps && e.target!==pb){ const r=Date.now()-ps; pst.innerHTML=`✅ REACTION: ${r} ms`; pr.innerHTML=r<200?'🏆 WORLD CLASS':'🔄 GOOD'; pa=false; ps=null; if(pt) clearTimeout(pt); } });
        } },
        { title: '🏁 LAP COUNTER', fn: (c) => { c.innerHTML = `<div>Click as fast as possible (10 sec)</div><div id="lapCounter" class="big-number">0</div><button id="lapBtn">START LAPS</button><div id="lapResult" class="game-stats"></div>`;
            let la=false, lc=0, li=null; const lb=document.getElementById('lapBtn'), lct=document.getElementById('lapCounter'), lr=document.getElementById('lapResult');
            lb.onclick=()=>{ if(li) clearInterval(li); lc=0; lct.innerText='0'; lr.innerHTML=''; la=true; let tl=10; lr.innerHTML=`⏱️ ${tl} sec left`; li=setInterval(()=>{ tl--; lr.innerHTML=`⏱️ ${tl} sec left`; if(tl<=0){ clearInterval(li); la=false; lr.innerHTML=`✅ FINISHED: ${lc} laps`; } },1000); };
            document.addEventListener('click',(e)=>{ if(la && e.target!==lb) { lc++; lct.innerText=lc; } });
        } },
        { title: '🧠 DRIVER MEMORY', fn: (c) => { c.innerHTML = `<div id="memoryQuestion">Press START</div><input id="memoryInput" placeholder="Team name"><button id="memoryBtn">START</button><button id="checkMemoryBtn">CHECK</button><div id="memoryResult" class="game-stats"></div>`;
            const dr={'max verstappen':'red bull','lewis hamilton':'ferrari','lando norris':'mclaren','charles leclerc':'ferrari','george russell':'mercedes'}; let cur='';
            const mq=document.getElementById('memoryQuestion'), mi=document.getElementById('memoryInput'), mr=document.getElementById('memoryResult');
            document.getElementById('memoryBtn').onclick=()=>{ const ks=Object.keys(dr); cur=ks[Math.floor(Math.random()*ks.length)]; mq.innerHTML=`🏎️ DRIVER: ${cur.toUpperCase()}`; mi.value=''; mr.innerHTML=''; };
            document.getElementById('checkMemoryBtn').onclick=()=>{ if(!cur){ mr.innerHTML='❌ START FIRST'; return; } const ans=mi.value.trim().toLowerCase(); mr.innerHTML=(ans===dr[cur])?'✅ CORRECT':`❌ WRONG → ${dr[cur].toUpperCase()}`; };
        } },
        { title: '🏎️ TRACK TIME TRIAL', fn: (c) => { c.innerHTML = `<div>Press S1 → S2 → S3 fast</div><div class="flex-buttons"><button id="s1" disabled>S1</button><button id="s2" disabled>S2</button><button id="s3" disabled>S3</button></div><button id="startTrackBtn">START LAP</button><div id="trackResult" class="game-stats"></div>`;
            let st=0, start=null, act=false; const s1=document.getElementById('s1'), s2=document.getElementById('s2'), s3=document.getElementById('s3'), tr=document.getElementById('trackResult');
            const reset=()=>{ s1.disabled=s2.disabled=s3.disabled=true; s1.style.opacity=s2.style.opacity=s3.style.opacity='0.5'; };
            document.getElementById('startTrackBtn').onclick=()=>{ st=1; act=true; start=Date.now(); s1.disabled=false; s2.disabled=true; s3.disabled=true; s1.style.opacity='1'; s2.style.opacity='0.5'; s3.style.opacity='0.5'; tr.innerHTML='⚡ PRESS S1 → S2 → S3'; };
            s1.onclick=()=>{ if(act && st===1){ st=2; s1.disabled=true; s2.disabled=false; s1.style.opacity='0.5'; s2.style.opacity='1'; } };
            s2.onclick=()=>{ if(act && st===2){ st=3; s2.disabled=true; s3.disabled=false; s2.style.opacity='0.5'; s3.style.opacity='1'; } };
            s3.onclick=()=>{ if(act && st===3){ const t=Date.now()-start; tr.innerHTML=`🏁 ${t} ms ${t<1800?'🔥 RECORD':''}`; act=false; reset(); } };
            reset();
        } },
        { title: '🏁 GUESS THE FLAG', fn: (c) => { c.innerHTML = `<div id="flagQuestion">Press START</div><input id="flagInput" placeholder="Country name"><button id="flagStartBtn">START</button><button id="flagCheckBtn">CHECK</button><div id="flagResult" class="game-stats"></div>`;
            const trs={'silverstone':'uk','monza':'italy','monaco':'monaco','spa':'belgium','baku':'azerbaijan'}; let cur='';
            const fq=document.getElementById('flagQuestion'), fi=document.getElementById('flagInput'), fr=document.getElementById('flagResult');
            document.getElementById('flagStartBtn').onclick=()=>{ const ks=Object.keys(trs); cur=ks[Math.floor(Math.random()*ks.length)]; fq.innerHTML=`📍 ${cur.toUpperCase()}`; fi.value=''; fr.innerHTML=''; };
            document.getElementById('flagCheckBtn').onclick=()=>{ if(!cur){ fr.innerHTML='❌ START'; return; } const ans=fi.value.trim().toLowerCase(); fr.innerHTML=(ans===trs[cur])?'✅ CORRECT':`❌ WRONG → ${trs[cur].toUpperCase()}`; };
        } },
        { title: '⚡ SPRINT TAP', fn: (c) => { c.innerHTML = `<div>Tap any key / click – 10 sec</div><div id="sprintCounter" class="big-number">0</div><button id="sprintStartBtn">START SPRINT</button><div id="sprintResult" class="game-stats"></div>`;
            let act=false, cnt=0, inv=null; const sc=document.getElementById('sprintCounter'), sr=document.getElementById('sprintResult'), ss=document.getElementById('sprintStartBtn');
            const h=()=>{ if(act){ cnt++; sc.innerText=cnt; } };
            ss.onclick=()=>{ if(inv) clearInterval(inv); cnt=0; sc.innerText='0'; act=true; let tl=10; sr.innerHTML=`⚡ ${tl} sec left`; inv=setInterval(()=>{ tl--; sr.innerHTML=`⚡ ${tl} sec left`; if(tl<=0){ clearInterval(inv); act=false; sr.innerHTML=`✅ FINISHED: ${cnt} taps`; } },1000); };
            document.addEventListener('click',h); document.addEventListener('keydown',h);
        } },
        { title: '🔧 MECHANIC ERROR', fn: (c) => { c.innerHTML = `<div id="mechStatus" style="font-size:22px;">⚫ READY</div><button id="mechStartBtn">START</button><div id="mechResult" class="game-stats"></div>`;
            let act=false, tm=null; const ms=document.getElementById('mechStatus'), mr=document.getElementById('mechResult'), mb=document.getElementById('mechStartBtn');
            function sh(){ if(!act) return; const isR=Math.random()<0.5; ms.innerHTML=isR?'🔴🔴 CLICK NOW 🔴🔴':'🟢🟢 DON\'T CLICK 🟢🟢'; ms.style.color=isR?'#ff003c':'#00ffcc'; tm=setTimeout(sh, Math.random()*1500+500); }
            mb.onclick=()=>{ if(tm) clearTimeout(tm); act=true; mr.innerHTML='⚡ GAME ACTIVE'; sh(); setTimeout(()=>{ if(act){ act=false; clearTimeout(tm); ms.innerHTML='⚫ GAME OVER'; } },15000); };
            document.addEventListener('click',(e)=>{ if(!act || e.target===mb) return; const isR=ms.innerHTML.includes('🔴🔴 CLICK NOW'); if(isR){ mr.innerHTML='✅ +100'; if(tm) clearTimeout(tm); sh(); } else { mr.innerHTML='❌ PENALTY'; act=false; clearTimeout(tm); ms.innerHTML='⚠️ ERROR'; } });
        } },
        { title: '🚦 OVERTAKE DUEL', fn: (c) => { c.innerHTML = `<div>Press A (left) or D (right) faster than AI</div><div id="duelStatus" style="font-size:18px;">⚡ READY</div><button id="duelStartBtn">START DUEL</button><div id="duelResult" class="game-stats"></div>`;
            let act=false, st=null, side=''; const ds=document.getElementById('duelStatus'), dr=document.getElementById('duelResult'), db=document.getElementById('duelStartBtn');
            db.onclick=()=>{ act=true; side=Math.random()<0.5?'A':'D'; st=Date.now(); ds.innerHTML=`🏁 PRESS ${side} NOW!`; dr.innerHTML=''; setTimeout(()=>{ if(act){ act=false; ds.innerHTML='❌ TOO SLOW'; dr.innerHTML='AI OVERTAKES'; } },1800); };
            document.addEventListener('keydown',(e)=>{ if(!act) return; const k=e.key.toUpperCase(); if(k===side){ const t=Date.now()-st; act=false; ds.innerHTML=`✅ OVERTAKE! ${t}ms`; dr.innerHTML=t<400?'🏆 PERFECT':'✔️ SUCCESS'; } else if(k==='A'||k==='D'){ act=false; ds.innerHTML='❌ WRONG LANE'; dr.innerHTML='PENALTY'; } });
        } },
        { title: '🔢 GRID QUIZ', fn: (c) => { c.innerHTML = `<div id="quizQuestion">Press START</div><input id="quizInput" placeholder="Driver name"><button id="quizStartBtn">START</button><button id="quizCheckBtn">CHECK</button><div id="quizResult" class="game-stats"></div>`;
            const nums={44:'Lewis Hamilton',1:'Max Verstappen',4:'Lando Norris',16:'Charles Leclerc',63:'George Russell'}; let cur='';
            const qq=document.getElementById('quizQuestion'), qi=document.getElementById('quizInput'), qr=document.getElementById('quizResult');
            document.getElementById('quizStartBtn').onclick=()=>{ const ks=Object.keys(nums); cur=ks[Math.floor(Math.random()*ks.length)]; qq.innerHTML=`🏁 CAR NUMBER: ${cur}`; qi.value=''; qr.innerHTML=''; };
            document.getElementById('quizCheckBtn').onclick=()=>{ if(!cur){ qr.innerHTML='❌ START'; return; } const ans=qi.value.trim().toLowerCase(); qr.innerHTML=(ans===nums[cur].toLowerCase())?'✅ CORRECT':`❌ WRONG → ${nums[cur]}`; };
        } },
        { title: '🌡️ TYRE TEMP', fn: (c) => { c.innerHTML = `<div>Click in GREEN zone (0–500)</div><div id="tempSlider" style="height:20px;background:#222;margin:10px 0;position:relative;"><div id="tempMarker" style="width:4px;height:20px;background:#ff003c;position:absolute;"></div></div><div id="tempValue">0°</div><button id="tempStartBtn">NEW TEMP</button><div id="tempResult" class="game-stats"></div>`;
            let t=250, sc=0; const tv=document.getElementById('tempValue'), tr=document.getElementById('tempResult'), tb=document.getElementById('tempStartBtn');
            function up(){ t=Math.floor(Math.random()*1000); tv.innerText=`${t}°`; }
            tb.onclick=()=>{ up(); tr.innerHTML=''; sc=0; };
            document.getElementById('tempSlider').onclick=(e)=>{ const rect=e.currentTarget.getBoundingClientRect(); const x=e.clientX-rect.left; const p=x/rect.width; const cv=Math.floor(p*1000); const d=Math.abs(cv-t); const pts=Math.max(0,500-d); sc+=pts; tr.innerHTML=`+${pts} (total ${sc})`; up(); };
            up();
        } },
        { title: '⛽ FUEL SAVING', fn: (c) => { c.innerHTML = `<div>Click when fuel ≤ 50 (0–100)</div><div id="fuelValue" class="big-number">50</div><button id="fuelStartBtn">NEW LAP</button><div id="fuelResult" class="game-stats"></div>`;
            let f=50, act=true, inv=null; const fv=document.getElementById('fuelValue'), fr=document.getElementById('fuelResult'), fb=document.getElementById('fuelStartBtn');
            function startF(){ if(inv) clearInterval(inv); act=true; f=Math.floor(Math.random()*80)+20; fv.innerText=f; inv=setInterval(()=>{ if(act && f>0){ f--; fv.innerText=f; } },200); }
            fb.onclick=()=>{ startF(); fr.innerHTML=''; };
            document.addEventListener('click',()=>{ if(act && f<=50){ fr.innerHTML='✅ PERFECT SAVING! +1 LAP'; act=false; if(inv) clearInterval(inv); } else if(act){ fr.innerHTML='❌ TOO EARLY! FUEL WASTED'; act=false; if(inv) clearInterval(inv); } });
            startF();
        } },
        { title: '🕒 PIT WINDOW', fn: (c) => { c.innerHTML = `<div>Click when timer between 10–20</div><div id="pitTimer" class="big-number">0</div><button id="pitWindowStart">RESET</button><div id="pitWindowResult" class="game-stats"></div>`;
            let t=0, run=true, inv=null; const pt=document.getElementById('pitTimer'), pr=document.getElementById('pitWindowResult'), pb=document.getElementById('pitWindowStart');
            function resetT(){ if(inv) clearInterval(inv); t=0; run=true; pt.innerText='0'; inv=setInterval(()=>{ if(run){ t+=0.1; pt.innerText=t.toFixed(1); } },100); }
            pb.onclick=()=>{ resetT(); pr.innerHTML=''; };
            document.addEventListener('click',()=>{ if(run){ const val=parseFloat(pt.innerText); if(val>=10 && val<=20){ pr.innerHTML=`✅ PERFECT PIT! (${val.toFixed(1)}s)`; run=false; clearInterval(inv); } else { pr.innerHTML=`❌ BAD WINDOW (${val.toFixed(1)}s)`; run=false; clearInterval(inv); } } });
            resetT();
        } },
        { title: '🚥 GRID START', fn: (c) => { c.innerHTML = `<div>Click when lights go OUT</div><div id="lights" style="font-size:28px;">🔴🔴🔴🔴🔴</div><button id="gridStartBtn">RESTART</button><div id="gridResult" class="game-stats"></div>`;
            let act=false, st=null, to=null; const l=document.getElementById('lights'), gr=document.getElementById('gridResult'), gb=document.getElementById('gridStartBtn');
            function startL(){ if(to) clearTimeout(to); act=true; st=null; let cnt=0; l.innerHTML='🔴🔴🔴🔴🔴'; const iv=setInterval(()=>{ if(cnt<4){ l.innerHTML=l.innerHTML.slice(0,-2); cnt++; } else { clearInterval(iv); const d=Math.random()*3000+500; to=setTimeout(()=>{ if(act){ l.innerHTML='⚫⚫⚫⚫⚫'; st=Date.now(); } },d); } },800); }
            gb.onclick=()=>{ startL(); gr.innerHTML=''; };
            document.addEventListener('click',(e)=>{ if(act && st && e.target!==gb){ const r=Date.now()-st; gr.innerHTML=`✅ ${r} ms`; act=false; if(to) clearTimeout(to); } });
            startL();
        } },
        { title: '🚨 SAFETY CAR', fn: (c) => { c.innerHTML = `<div>Guess safety car number (1–20)</div><input id="scGuess" type="number"><button id="scCheckBtn">GUESS</button><div id="scResult" class="game-stats"></div>`;
            let sec=Math.floor(Math.random()*20)+1; const sr=document.getElementById('scResult'), sg=document.getElementById('scGuess'), sb=document.getElementById('scCheckBtn');
            sb.onclick=()=>{ const g=parseInt(sg.value); if(g===sec){ sr.innerHTML='✅ YOU CAUGHT THE SAFETY CAR!'; sec=Math.floor(Math.random()*20)+1; } else { sr.innerHTML=`❌ WRONG → it was ${sec}`; sec=Math.floor(Math.random()*20)+1; } sg.value=''; };
        } },
        { title: '💨 FASTEST LAP', fn: (c) => { c.innerHTML = `<div>Which colour is fastest? (red/blue/silver)</div><div class="flex-buttons"><button id="colorRed">RED</button><button id="colorBlue">BLUE</button><button id="colorSilver">SILVER</button></div><div id="colorResult" class="game-stats"></div>`;
            const cr=document.getElementById('colorResult'); const ch=(c)=> cr.innerHTML=(c==='red')?'✅ FASTEST LAP! +1':'❌ WRONG, red bull is red';
            document.getElementById('colorRed').onclick=()=>ch('red'); document.getElementById('colorBlue').onclick=()=>ch('blue'); document.getElementById('colorSilver').onclick=()=>ch('silver');
        } }
    ];
    for(let i=0;i<gamesList.length;i++) createGameCard(gamesList[i].title, gamesList[i].fn, `game_${i}`);
</script>
</body>
</html>
