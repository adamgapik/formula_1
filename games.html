<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>F1 TOP-DOWN RACING · FULL CIRCUIT</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
        .game-card { background: #0b0e14; border: 1px solid #ff003c; padding: 20px; transition: 0.2s; }
        .game-card:hover { border-color: #00c8ff; box-shadow: 0 0 12px #00c8ff; }
        .game-title { font-size: 20px; font-weight: 800; margin-bottom: 12px; color: #ff003c; }
        button { background: #ff003c; border: none; color: #000; font-weight: 700; padding: 8px 16px; margin: 12px 6px 0 0; cursor: pointer; font-family: monospace; transition: 0.1s; }
        button:hover { background: #00c8ff; box-shadow: 0 0 8px #00c8ff; }
        select, input { background: #0b0e14; border: 1px solid #ff003c; color: #eef2ff; padding: 8px; width: 100%; margin-top: 10px; }
        .game-stats { margin-top: 12px; font-size: 13px; color: #b0c4de; }
        .race-canvas-container { background: #000; border-radius: 12px; padding: 8px; margin: 12px 0; border: 1px solid #ff003c; }
        canvas { display: block; margin: 0 auto; background: #0a0f1a; border-radius: 8px; width: 100%; height: auto; cursor: none; }
        .race-controls { display: flex; gap: 12px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
        .race-controls button { margin-top: 0; padding: 10px 20px; font-size: 16px; min-width: 70px; }
        .sim-panel { background: #0b0e14; border: 1px solid #ff003c; padding: 12px; margin: 12px 0; border-radius: 8px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center; }
        @media (max-width: 700px) { .race-controls button { padding: 6px 12px; font-size: 12px; min-width: 60px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html" class="active">SIMULATOR</a>
    </div>
    <h1>🏁 TOP-DOWN CIRCUIT RACING · FULL TRACK</h1>
    <div class="games-grid" id="gamesGrid"></div>
    <div class="footer">⚡ GAS / BRAKE / TURN LEFT/RIGHT · YOU SEE THE WHOLE CIRCUIT</div>
</div>

<script>
    const gamesGrid = document.getElementById('gamesGrid');

    function createGameCard(title, contentFn, id) {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<div class="game-title">${title}</div><div id="${id}">loading...</div>`;
        gamesGrid.appendChild(card);
        const container = document.getElementById(id);
        if (container) contentFn(container);
    }

    // ========== ГОНКА С ВИДОМ СВЕРХУ (ВИДНА ВСЯ ТРАССА) ==========
    createGameCard('🏎️ TOP-DOWN RACING', (cont) => {
        cont.innerHTML = `
            <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:space-between;">
                <select id="racingDriver" style="width:48%;">
                    <option value="Max Verstappen">Max Verstappen (Red Bull)</option>
                    <option value="Lewis Hamilton">Lewis Hamilton (Ferrari)</option>
                    <option value="Lando Norris">Lando Norris (McLaren)</option>
                    <option value="Charles Leclerc">Charles Leclerc (Ferrari)</option>
                    <option value="George Russell">George Russell (Mercedes)</option>
                </select>
                <select id="trackSelect" style="width:48%;">
                    <option value="monaco">🇲🇨 MONACO</option>
                    <option value="monza">🇮🇹 MONZA</option>
                    <option value="silverstone">🇬🇧 SILVERSTONE</option>
                </select>
            </div>
            <div class="sim-panel">
                <label>🌧️ WEATHER: <select id="weatherSelect"><option value="sunny">☀️ SUNNY</option><option value="rain">🌧️ RAIN</option><option value="night">🌙 NIGHT</option></select></label>
                <label>🏎️ GRIP: <input type="range" id="gripSlider" min="0" max="100" value="70" style="width:120px;"></label>
            </div>
            <div class="race-canvas-container">
                <canvas id="raceCanvas" width="900" height="700" style="width:100%; height:auto; max-width:900px; aspect-ratio:900/700"></canvas>
            </div>
            <div class="race-controls">
                <button id="gasBtn">⚡ GAS (↑)</button>
                <button id="brakeBtn">🛑 BRAKE (↓)</button>
                <button id="leftBtn">↶ LEFT (←)</button>
                <button id="rightBtn">↷ RIGHT (→)</button>
            </div>
            <div id="raceInfo" style="font-family:monospace; margin-top:12px; display:flex; justify-content:space-between; flex-wrap:wrap;">
                <span>🏁 LAPS: <span id="lapCount">0</span>/5</span>
                <span>🏆 POS: <span id="positionText">P6</span></span>
                <span>⚡ OVERTAKES: <span id="overtakesCount">0</span></span>
                <span>🏎️ SPEED: <span id="speedDisplay">0</span> km/h</span>
            </div>
            <button id="startRaceBtn">🏁 START RACE 🏁</button>
            <div id="raceMessage" class="game-stats"></div>
        `;

        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        let animFrame = null;
        let raceActive = false;
        
        // Параметры трассы (круг)
        let trackPoints = [];
        let trackLength = 0;
        
        // Игрок
        let player = { x: 0, y: 0, angle: 0, speed: 0, lap: 0, totalDistance: 0, bestLapDist: 0 };
        let opponents = [];
        let laps = 0, overtakes = 0;
        let currentPosition = 6;
        let lastCheck = false;
        
        let gas = false, brake = false, turnLeft = false, turnRight = false;
        let grip = 1.0;
        
        function buildTrack() {
            const trackType = document.getElementById('trackSelect').value;
            trackPoints = [];
            if(trackType === 'monaco') {
                // Узкая извилистая трасса
                for(let i=0;i<=100;i++) {
                    let t = i/100;
                    let angle = t * Math.PI * 2;
                    let r = 200 + Math.sin(angle*5)*30;
                    let x = canvas.width/2 + Math.cos(angle)*r;
                    let y = canvas.height/2 + Math.sin(angle)*r;
                    trackPoints.push({x, y});
                }
            } else if(trackType === 'monza') {
                // Скоростная трасса с длинными прямыми
                for(let i=0;i<=100;i++) {
                    let t = i/100;
                    let angle = t * Math.PI * 2;
                    let r = 250 + Math.sin(angle*2)*40;
                    let x = canvas.width/2 + Math.cos(angle)*r;
                    let y = canvas.height/2 + Math.sin(angle)*r;
                    trackPoints.push({x, y});
                }
            } else {
                // Silverstone – смешанная
                for(let i=0;i<=100;i++) {
                    let t = i/100;
                    let angle = t * Math.PI * 2;
                    let r = 220 + Math.sin(angle*3.5)*35;
                    let x = canvas.width/2 + Math.cos(angle)*r;
                    let y = canvas.height/2 + Math.sin(angle)*r;
                    trackPoints.push({x, y});
                }
            }
            trackLength = 0;
            for(let i=0;i<trackPoints.length-1;i++) {
                let dx = trackPoints[i+1].x - trackPoints[i].x;
                let dy = trackPoints[i+1].y - trackPoints[i].y;
                trackLength += Math.hypot(dx, dy);
            }
        }
        
        function getTrackPosition(dist) {
            let d = dist % trackLength;
            for(let i=0;i<trackPoints.length-1;i++) {
                let dx = trackPoints[i+1].x - trackPoints[i].x;
                let dy = trackPoints[i+1].y - trackPoints[i].y;
                let segLen = Math.hypot(dx, dy);
                if(d <= segLen) {
                    let t = d / segLen;
                    let x = trackPoints[i].x + dx * t;
                    let y = trackPoints[i].y + dy * t;
                    let angle = Math.atan2(dy, dx);
                    return {x, y, angle};
                }
                d -= segLen;
            }
            return {x: trackPoints[0].x, y: trackPoints[0].y, angle: 0};
        }
        
        function drawTrack() {
            ctx.beginPath();
            ctx.moveTo(trackPoints[0].x, trackPoints[0].y);
            for(let i=1;i<trackPoints.length;i++) {
                ctx.lineTo(trackPoints[i].x, trackPoints[i].y);
            }
            ctx.closePath();
            ctx.strokeStyle = '#ff003c';
            ctx.lineWidth = 8;
            ctx.stroke();
            ctx.fillStyle = '#2a2f3a';
            ctx.fill();
            // Стартовая черта
            let start = trackPoints[0];
            let next = trackPoints[1];
            let angle = Math.atan2(next.y - start.y, next.x - start.x);
            let perpX = -Math.sin(angle);
            let perpY = Math.cos(angle);
            ctx.beginPath();
            ctx.moveTo(start.x + perpX*15, start.y + perpY*15);
            ctx.lineTo(start.x - perpX*15, start.y - perpY*15);
            ctx.lineTo(next.x - perpX*15, next.y - perpY*15);
            ctx.lineTo(next.x + perpX*15, next.y + perpY*15);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.fillStyle = '#ff003c';
            ctx.font = 'bold 14px monospace';
            ctx.fillText('S/F', start.x-20, start.y-10);
        }
        
        function drawCar(x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            ctx.fillRect(-12, -8, 24, 16);
            ctx.fillStyle = '#111';
            ctx.fillRect(-14, -4, 4, 8);
            ctx.fillRect(10, -4, 4, 8);
            ctx.fillStyle = '#888';
            ctx.fillRect(-4, -10, 8, 4);
            ctx.restore();
        }
        
        function drawOpponent(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = '#4a5568';
            ctx.fillRect(-12, -8, 24, 16);
            ctx.fillStyle = '#2d3748';
            ctx.fillRect(-10, -4, 20, 8);
            ctx.restore();
        }
        
        function getDriverColor(name) {
            if(name.includes('Verstappen')||name.includes('Hamilton')||name.includes('Leclerc')) return '#e10600';
            if(name.includes('Norris')) return '#ff8700';
            if(name.includes('Russell')) return '#00d4ff';
            return '#ccc';
        }
        
        function updatePosition() {
            let ahead = opponents.filter(o => o.distance > player.totalDistance).length;
            currentPosition = Math.min(ahead+1,6);
            document.getElementById('positionText').innerText = `P${currentPosition}`;
        }
        
        function updateGame() {
            if(!raceActive) return;
            
            const weather = document.getElementById('weatherSelect').value;
            let weatherGrip = weather === 'rain' ? 0.6 : (weather === 'night' ? 0.85 : 1.0);
            let sliderGrip = parseInt(document.getElementById('gripSlider').value) / 100;
            grip = weatherGrip * (0.5 + sliderGrip * 0.5);
            
            if(gas) { player.speed += 3.5 * grip; if(player.speed > 280) player.speed = 280; }
            if(brake) { player.speed -= 7; if(player.speed < 0) player.speed = 0; }
            player.speed *= 0.99;
            if(player.speed < 1 && !gas && !brake) player.speed = 0;
            
            let turn = 0;
            if(turnLeft) turn = -0.09;
            if(turnRight) turn = 0.09;
            player.angle += turn * (player.speed / 200);
            
            let moveDist = player.speed * 0.15;
            player.totalDistance += moveDist;
            
            if(player.totalDistance >= trackLength) {
                player.totalDistance -= trackLength;
                laps++;
                document.getElementById('lapCount').innerText = laps;
                document.getElementById('raceMessage').innerHTML = `🏁 LAP ${laps}/5 🏁`;
                if(laps >= 5) {
                    raceActive = false;
                    const driver = document.getElementById('racingDriver').value;
                    let msg = currentPosition===1 ? `🏆 VICTORY! ${driver} WINS! ${overtakes} OVERTAKES 🏆` : 
                               (currentPosition<=3 ? `🎉 PODIUM! ${driver} P${currentPosition} 🎉` : 
                               `🏁 FINISHED: ${driver} P${currentPosition} · OVERTAKES: ${overtakes} 🏁`);
                    document.getElementById('raceMessage').innerHTML = msg;
                    if(animFrame) cancelAnimationFrame(animFrame);
                    return;
                }
            }
            
            let pos = getTrackPosition(player.totalDistance);
            player.x = pos.x;
            player.y = pos.y;
            player.angle = pos.angle;
            
            for(let opp of opponents) {
                opp.distance += opp.speed * 0.12;
                if(opp.distance >= trackLength) opp.distance -= trackLength;
                let oppPos = getTrackPosition(opp.distance);
                opp.x = oppPos.x;
                opp.y = oppPos.y;
                opp.angle = oppPos.angle;
            }
            
            // Обгоны
            for(let opp of opponents) {
                let distDiff = (player.totalDistance - opp.distance + trackLength) % trackLength;
                if(distDiff < 15 && distDiff > 5 && !opp.overtaken) {
                    opp.overtaken = true;
                    overtakes++;
                    document.getElementById('overtakesCount').innerText = overtakes;
                    document.getElementById('raceMessage').innerHTML = '✅ OVERTAKE! ✅';
                    setTimeout(()=>{ if(raceActive) document.getElementById('raceMessage').innerHTML='🏁 RACING 🏁'; },400);
                }
                if(distDiff > 30) opp.overtaken = false;
            }
            
            updatePosition();
            document.getElementById('speedDisplay').innerText = Math.floor(player.speed);
            
            // Отрисовка
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawTrack();
            
            for(let opp of opponents) drawOpponent(opp.x, opp.y, opp.angle);
            const driverName = document.getElementById('racingDriver').value;
            drawCar(player.x, player.y, player.angle, getDriverColor(driverName));
            
            // Погода
            if(weather === 'rain') {
                ctx.fillStyle = 'rgba(100,150,200,0.25)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                for(let i=0;i<200;i++) { ctx.fillStyle = '#aaf'; ctx.fillRect(10+Math.random()*canvas.width, Math.random()*canvas.height, 2, 6); }
            } else if(weather === 'night') {
                ctx.fillStyle = 'rgba(0,0,50,0.5)';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                for(let i=0;i<100;i++) { ctx.fillStyle = '#ffa'; ctx.beginPath(); ctx.arc(20+Math.random()*canvas.width, 20+Math.random()*canvas.height, 2,0,Math.PI*2); ctx.fill(); }
            }
            
            animFrame = requestAnimationFrame(updateGame);
        }
        
        function initRace() {
            buildTrack();
            player = { x: 0, y: 0, angle: 0, speed: 0, lap: 0, totalDistance: 0 };
            opponents = [];
            for(let i=0;i<5;i++) {
                opponents.push({
                    distance: Math.random() * trackLength,
                    speed: 120 + Math.random() * 60,
                    x: 0, y: 0, angle: 0, overtaken: false
                });
            }
            laps = 0; overtakes = 0; currentPosition = 6;
            gas = false; brake = false; turnLeft = false; turnRight = false;
            let startPos = getTrackPosition(0);
            player.x = startPos.x; player.y = startPos.y; player.angle = startPos.angle;
            for(let opp of opponents) {
                let oppPos = getTrackPosition(opp.distance);
                opp.x = oppPos.x; opp.y = oppPos.y; opp.angle = oppPos.angle;
            }
            document.getElementById('lapCount').innerText = '0';
            document.getElementById('overtakesCount').innerText = '0';
            document.getElementById('speedDisplay').innerText = '0';
            document.getElementById('positionText').innerText = 'P6';
            document.getElementById('raceMessage').innerHTML = '🏁 PRESS GAS (↑) 🏁';
        }
        
        const gasBtn = document.getElementById('gasBtn'), brakeBtn = document.getElementById('brakeBtn');
        const leftBtn = document.getElementById('leftBtn'), rightBtn = document.getElementById('rightBtn');
        gasBtn.onmousedown = () => gas=true; gasBtn.onmouseup = () => gas=false;
        gasBtn.ontouchstart = e=>{e.preventDefault(); gas=true;}; gasBtn.ontouchend = ()=>gas=false;
        brakeBtn.onmousedown = () => brake=true; brakeBtn.onmouseup = () => brake=false;
        brakeBtn.ontouchstart = e=>{e.preventDefault(); brake=true;}; brakeBtn.ontouchend = ()=>brake=false;
        leftBtn.onmousedown = () => turnLeft=true; leftBtn.onmouseup = () => turnLeft=false;
        leftBtn.ontouchstart = e=>{e.preventDefault(); turnLeft=true;}; leftBtn.ontouchend = ()=>turnLeft=false;
        rightBtn.onmousedown = () => turnRight=true; rightBtn.onmouseup = () => turnRight=false;
        rightBtn.ontouchstart = e=>{e.preventDefault(); turnRight=true;}; rightBtn.ontouchend = ()=>turnRight=false;
        
        document.getElementById('startRaceBtn').onclick = () => {
            if(animFrame) cancelAnimationFrame(animFrame);
            initRace();
            raceActive = true;
            updateGame();
        };
        
        canvas.width = 900; canvas.height = 700;
        initRace();
    }, 'gameRacing');

    // ОСТАЛЬНЫЕ 14 МИНИ-ИГР (ПОЛНОСТЬЮ РАБОЧИЕ)
    const miniGames = [
        { title: '⏱️ REACTION PIT STOP', fn: (c) => { c.innerHTML = `<div>Click when light turns GREEN</div><div id="pitStatus" style="margin:12px 0;font-size:20px;font-weight:800;">🔴 WAITING</div><button id="pitBtn">START</button><div id="pitResult" class="game-stats"></div>`;
            let pitTimer=null, pitStart=null, pitActive=false;
            const pitBtn=document.getElementById('pitBtn'), pitStatus=document.getElementById('pitStatus'), pitResult=document.getElementById('pitResult');
            pitBtn.onclick=()=>{ if(pitTimer) clearTimeout(pitTimer); pitActive=true; pitStart=null; pitStatus.innerHTML='🟢 GET READY...'; pitResult.innerHTML=''; const delay=Math.random()*3000+1000; pitTimer=setTimeout(()=>{ if(pitActive){ pitStatus.innerHTML='🟢🟢 GO! CLICK NOW 🟢🟢'; pitStart=Date.now(); } },delay); setTimeout(()=>{ if(pitActive && !pitStart){ pitStatus.innerHTML='🔴 MISSED START'; pitActive=false; } },delay+2000); };
            document.addEventListener('click',(e)=>{ if(pitActive && pitStart && e.target!==pitBtn){ const react=Date.now()-pitStart; pitStatus.innerHTML=`✅ REACTION: ${react} ms`; pitResult.innerHTML=react<200?'🏆 WORLD CLASS':'🔄 GOOD'; pitActive=false; pitStart=null; if(pitTimer) clearTimeout(pitTimer); } });
        } },
        { title: '🏁 LAP COUNTER', fn: (c) => { c.innerHTML = `<div>Click as fast as possible (10 sec)</div><div id="lapCounter" class="big-number">0</div><button id="lapBtn">START LAPS</button><div id="lapResult" class="game-stats"></div>`;
            let lapActive=false, lapCount=0, lapInterval=null;
            const lapBtn=document.getElementById('lapBtn'), lapCounter=document.getElementById('lapCounter'), lapResult=document.getElementById('lapResult');
            lapBtn.onclick=()=>{ if(lapInterval) clearInterval(lapInterval); lapCount=0; lapCounter.innerText='0'; lapResult.innerHTML=''; lapActive=true; let timeLeft=10; lapResult.innerHTML=`⏱️ ${timeLeft} sec left`; lapInterval=setInterval(()=>{ timeLeft--; lapResult.innerHTML=`⏱️ ${timeLeft} sec left`; if(timeLeft<=0){ clearInterval(lapInterval); lapActive=false; lapResult.innerHTML=`✅ FINISHED: ${lapCount} laps`; } },1000); };
            document.addEventListener('click',(e)=>{ if(lapActive && e.target!==lapBtn) { lapCount++; lapCounter.innerText=lapCount; } });
        } },
        { title: '🧠 DRIVER MEMORY', fn: (c) => { c.innerHTML = `<div id="memoryQuestion">Press START</div><input id="memoryInput" placeholder="Team name"><button id="memoryBtn">START</button><button id="checkMemoryBtn">CHECK</button><div id="memoryResult" class="game-stats"></div>`;
            const drivers={'max verstappen':'red bull','lewis hamilton':'ferrari','lando norris':'mclaren','charles leclerc':'ferrari','george russell':'mercedes'};
            let current='';
            const mQ=document.getElementById('memoryQuestion'), mI=document.getElementById('memoryInput'), mR=document.getElementById('memoryResult');
            document.getElementById('memoryBtn').onclick=()=>{ const keys=Object.keys(drivers); current=keys[Math.floor(Math.random()*keys.length)]; mQ.innerHTML=`🏎️ DRIVER: ${current.toUpperCase()}`; mI.value=''; mR.innerHTML=''; };
            document.getElementById('checkMemoryBtn').onclick=()=>{ if(!current){ mR.innerHTML='❌ START FIRST'; return; } const ans=mI.value.trim().toLowerCase(); const correct=drivers[current]; mR.innerHTML=(ans===correct)?'✅ CORRECT':`❌ WRONG → ${correct.toUpperCase()}`; };
        } },
        { title: '🏎️ TRACK TIME TRIAL', fn: (c) => { c.innerHTML = `<div>Press S1 → S2 → S3 fast</div><div class="flex-buttons"><button id="s1" disabled>S1</button><button id="s2" disabled>S2</button><button id="s3" disabled>S3</button></div><button id="startTrackBtn">START LAP</button><div id="trackResult" class="game-stats"></div>`;
            let step=0, start=null, active=false;
            const s1=document.getElementById('s1'), s2=document.getElementById('s2'), s3=document.getElementById('s3'), tR=document.getElementById('trackResult');
            const reset=()=>{ s1.disabled=s2.disabled=s3.disabled=true; s1.style.opacity=s2.style.opacity=s3.style.opacity='0.5'; };
            document.getElementById('startTrackBtn').onclick=()=>{ step=1; active=true; start=Date.now(); s1.disabled=false; s2.disabled=true; s3.disabled=true; s1.style.opacity='1'; s2.style.opacity='0.5'; s3.style.opacity='0.5'; tR.innerHTML='⚡ PRESS S1 → S2 → S3'; };
            s1.onclick=()=>{ if(active && step===1){ step=2; s1.disabled=true; s2.disabled=false; s1.style.opacity='0.5'; s2.style.opacity='1'; } };
            s2.onclick=()=>{ if(active && step===2){ step=3; s2.disabled=true; s3.disabled=false; s2.style.opacity='0.5'; s3.style.opacity='1'; } };
            s3.onclick=()=>{ if(active && step===3){ const time=Date.now()-start; tR.innerHTML=`🏁 ${time} ms ${time<1800?'🔥 RECORD':''}`; active=false; reset(); } };
            reset();
        } },
        { title: '🏁 GUESS THE FLAG', fn: (c) => { c.innerHTML = `<div id="flagQuestion">Press START</div><input id="flagInput" placeholder="Country name"><button id="flagStartBtn">START</button><button id="flagCheckBtn">CHECK</button><div id="flagResult" class="game-stats"></div>`;
            const tracks={'silverstone':'uk','monza':'italy','monaco':'monaco','spa':'belgium','baku':'azerbaijan'};
            let current='';
            const fQ=document.getElementById('flagQuestion'), fI=document.getElementById('flagInput'), fR=document.getElementById('flagResult');
            document.getElementById('flagStartBtn').onclick=()=>{ const keys=Object.keys(tracks); current=keys[Math.floor(Math.random()*keys.length)]; fQ.innerHTML=`📍 ${current.toUpperCase()}`; fI.value=''; fR.innerHTML=''; };
            document.getElementById('flagCheckBtn').onclick=()=>{ if(!current){ fR.innerHTML='❌ START'; return; } const ans=fI.value.trim().toLowerCase(); fR.innerHTML=(ans===tracks[current])?'✅ CORRECT':`❌ WRONG → ${tracks[current].toUpperCase()}`; };
        } },
        { title: '⚡ SPRINT TAP', fn: (c) => { c.innerHTML = `<div>Tap any key / click – 10 sec</div><div id="sprintCounter" class="big-number">0</div><button id="sprintStartBtn">START SPRINT</button><div id="sprintResult" class="game-stats"></div>`;
            let active=false, count=0, interval=null;
            const sC=document.getElementById('sprintCounter'), sR=document.getElementById('sprintResult'), sS=document.getElementById('sprintStartBtn');
            const handler=()=>{ if(active){ count++; sC.innerText=count; } };
            sS.onclick=()=>{ if(interval) clearInterval(interval); count=0; sC.innerText='0'; active=true; let time=10; sR.innerHTML=`⚡ ${time} sec left`; interval=setInterval(()=>{ time--; sR.innerHTML=`⚡ ${time} sec left`; if(time<=0){ clearInterval(interval); active=false; sR.innerHTML=`✅ FINISHED: ${count} taps`; } },1000); };
            document.addEventListener('click',handler); document.addEventListener('keydown',handler);
        } },
        { title: '🔧 MECHANIC ERROR', fn: (c) => { c.innerHTML = `<div id="mechStatus" style="font-size:22px;">⚫ READY</div><button id="mechStartBtn">START</button><div id="mechResult" class="game-stats"></div>`;
            let active=false, timer=null;
            const mS=document.getElementById('mechStatus'), mR=document.getElementById('mechResult'), mSB=document.getElementById('mechStartBtn');
            function show(){ if(!active) return; const isRed=Math.random()<0.5; mS.innerHTML=isRed?'🔴🔴 CLICK NOW 🔴🔴':'🟢🟢 DON\'T CLICK 🟢🟢'; mS.style.color=isRed?'#ff003c':'#00ffcc'; timer=setTimeout(show, Math.random()*1500+500); }
            mSB.onclick=()=>{ if(timer) clearTimeout(timer); active=true; mR.innerHTML='⚡ GAME ACTIVE'; show(); setTimeout(()=>{ if(active){ active=false; clearTimeout(timer); mS.innerHTML='⚫ GAME OVER'; } },15000); };
            document.addEventListener('click',(e)=>{ if(!active || e.target===mSB) return; const isRed=mS.innerHTML.includes('🔴🔴 CLICK NOW'); if(isRed){ mR.innerHTML='✅ +100'; if(timer) clearTimeout(timer); show(); } else { mR.innerHTML='❌ PENALTY'; active=false; clearTimeout(timer); mS.innerHTML='⚠️ ERROR'; } });
        } },
        { title: '🚦 OVERTAKE DUEL', fn: (c) => { c.innerHTML = `<div>Press A (left) or D (right) faster than AI</div><div id="duelStatus" style="font-size:18px;">⚡ READY</div><button id="duelStartBtn">START DUEL</button><div id="duelResult" class="game-stats"></div>`;
            let duelActive=false, duelStart=null, duelSide='';
            const dS=document.getElementById('duelStatus'), dR=document.getElementById('duelResult'), dSB=document.getElementById('duelStartBtn');
            dSB.onclick=()=>{ duelActive=true; duelSide=Math.random()<0.5?'A':'D'; duelStart=Date.now(); dS.innerHTML=`🏁 PRESS ${duelSide} NOW!`; dR.innerHTML=''; setTimeout(()=>{ if(duelActive){ duelActive=false; dS.innerHTML='❌ TOO SLOW'; dR.innerHTML='AI OVERTAKES'; } },1800); };
            document.addEventListener('keydown',(e)=>{ if(!duelActive) return; const key=e.key.toUpperCase(); if(key===duelSide){ const time=Date.now()-duelStart; duelActive=false; dS.innerHTML=`✅ OVERTAKE! ${time}ms`; dR.innerHTML=time<400?'🏆 PERFECT':'✔️ SUCCESS'; } else if(key==='A'||key==='D'){ duelActive=false; dS.innerHTML='❌ WRONG LANE'; dR.innerHTML='PENALTY'; } });
        } },
        { title: '🔢 GRID QUIZ', fn: (c) => { c.innerHTML = `<div id="quizQuestion">Press START</div><input id="quizInput" placeholder="Driver name"><button id="quizStartBtn">START</button><button id="quizCheckBtn">CHECK</button><div id="quizResult" class="game-stats"></div>`;
            const nums={44:'Lewis Hamilton',1:'Max Verstappen',4:'Lando Norris',16:'Charles Leclerc',63:'George Russell'};
            let cur='';
            const qQ=document.getElementById('quizQuestion'), qI=document.getElementById('quizInput'), qR=document.getElementById('quizResult');
            document.getElementById('quizStartBtn').onclick=()=>{ const keys=Object.keys(nums); cur=keys[Math.floor(Math.random()*keys.length)]; qQ.innerHTML=`🏁 CAR NUMBER: ${cur}`; qI.value=''; qR.innerHTML=''; };
            document.getElementById('quizCheckBtn').onclick=()=>{ if(!cur){ qR.innerHTML='❌ START'; return; } const ans=qI.value.trim().toLowerCase(); const correct=nums[cur].toLowerCase(); qR.innerHTML=(ans===correct)?'✅ CORRECT':`❌ WRONG → ${nums[cur]}`; };
        } },
        { title: '🌡️ TYRE TEMP', fn: (c) => { c.innerHTML = `<div>Click in GREEN zone (0–500)</div><div id="tempSlider" style="height:20px;background:#222;margin:10px 0;position:relative;"><div id="tempMarker" style="width:4px;height:20px;background:#ff003c;position:absolute;"></div></div><div id="tempValue">0°</div><button id="tempStartBtn">NEW TEMP</button><div id="tempResult" class="game-stats"></div>`;
            let target=250, score=0;
            const tV=document.getElementById('tempValue'), tR=document.getElementById('tempResult'), tSB=document.getElementById('tempStartBtn');
            function up(){ target=Math.floor(Math.random()*1000); tV.innerText=`${target}°`; }
            tSB.onclick=()=>{ up(); tR.innerHTML=''; score=0; };
            document.getElementById('tempSlider').onclick=(e)=>{ const rect=e.currentTarget.getBoundingClientRect(); const x=e.clientX-rect.left; const percent=x/rect.width; const clickVal=Math.floor(percent*1000); const diff=Math.abs(clickVal-target); const points=Math.max(0,500-diff); score+=points; tR.innerHTML=`+${points} (total ${score})`; up(); };
            up();
        } },
        { title: '⛽ FUEL SAVING', fn: (c) => { c.innerHTML = `<div>Click when fuel ≤ 50 (0–100)</div><div id="fuelValue" class="big-number">50</div><button id="fuelStartBtn">NEW LAP</button><div id="fuelResult" class="game-stats"></div>`;
            let fuel=50, act=true, inter=null;
            const fV=document.getElementById('fuelValue'), fR=document.getElementById('fuelResult'), fSB=document.getElementById('fuelStartBtn');
            function startF(){ if(inter) clearInterval(inter); act=true; fuel=Math.floor(Math.random()*80)+20; fV.innerText=fuel; inter=setInterval(()=>{ if(act && fuel>0){ fuel--; fV.innerText=fuel; } },200); }
            fSB.onclick=()=>{ startF(); fR.innerHTML=''; };
            document.addEventListener('click',()=>{ if(act && fuel<=50){ fR.innerHTML='✅ PERFECT SAVING! +1 LAP'; act=false; if(inter) clearInterval(inter); } else if(act){ fR.innerHTML='❌ TOO EARLY! FUEL WASTED'; act=false; if(inter) clearInterval(inter); } });
            startF();
        } },
        { title: '🕒 PIT WINDOW', fn: (c) => { c.innerHTML = `<div>Click when timer between 10–20</div><div id="pitTimer" class="big-number">0</div><button id="pitWindowStart">RESET</button><div id="pitWindowResult" class="game-stats"></div>`;
            let t=0, run=true, inter=null;
            const pT=document.getElementById('pitTimer'), pR=document.getElementById('pitWindowResult'), pSB=document.getElementById('pitWindowStart');
            function resetT(){ if(inter) clearInterval(inter); t=0; run=true; pT.innerText='0'; inter=setInterval(()=>{ if(run){ t+=0.1; pT.innerText=t.toFixed(1); } },100); }
            pSB.onclick=()=>{ resetT(); pR.innerHTML=''; };
            document.addEventListener('click',()=>{ if(run){ const val=parseFloat(pT.innerText); if(val>=10 && val<=20){ pR.innerHTML=`✅ PERFECT PIT! (${val.toFixed(1)}s)`; run=false; clearInterval(inter); } else { pR.innerHTML=`❌ BAD WINDOW (${val.toFixed(1)}s)`; run=false; clearInterval(inter); } } });
            resetT();
        } },
        { title: '🚥 GRID START', fn: (c) => { c.innerHTML = `<div>Click when lights go OUT</div><div id="lights" style="font-size:28px;">🔴🔴🔴🔴🔴</div><button id="gridStartBtn">RESTART</button><div id="gridResult" class="game-stats"></div>`;
            let active=false, startTime=null, to=null;
            const l=document.getElementById('lights'), gr=document.getElementById('gridResult'), gsb=document.getElementById('gridStartBtn');
            function startL(){ if(to) clearTimeout(to); active=true; startTime=null; let cnt=0; l.innerHTML='🔴🔴🔴🔴🔴'; const intv=setInterval(()=>{ if(cnt<4){ l.innerHTML=l.innerHTML.slice(0,-2); cnt++; } else { clearInterval(intv); const delay=Math.random()*3000+500; to=setTimeout(()=>{ if(active){ l.innerHTML='⚫⚫⚫⚫⚫'; startTime=Date.now(); } },delay); } },800); }
            gsb.onclick=()=>{ startL(); gr.innerHTML=''; };
            document.addEventListener('click',(e)=>{ if(active && startTime && e.target!==gsb){ const r=Date.now()-startTime; gr.innerHTML=`✅ ${r} ms`; active=false; if(to) clearTimeout(to); } });
            startL();
        } },
        { title: '🚨 SAFETY CAR', fn: (c) => { c.innerHTML = `<div>Guess safety car number (1–20)</div><input id="scGuess" type="number"><button id="scCheckBtn">GUESS</button><div id="scResult" class="game-stats"></div>`;
            let secret=Math.floor(Math.random()*20)+1;
            const scR=document.getElementById('scResult'), scG=document.getElementById('scGuess'), scB=document.getElementById('scCheckBtn');
            scB.onclick=()=>{ const g=parseInt(scG.value); if(g===secret){ scR.innerHTML='✅ YOU CAUGHT THE SAFETY CAR!'; secret=Math.floor(Math.random()*20)+1; } else { scR.innerHTML=`❌ WRONG → it was ${secret}`; secret=Math.floor(Math.random()*20)+1; } scG.value=''; };
        } },
        { title: '💨 FASTEST LAP', fn: (c) => { c.innerHTML = `<div>Which colour is fastest? (red/blue/silver)</div><div class="flex-buttons"><button id="colorRed">RED</button><button id="colorBlue">BLUE</button><button id="colorSilver">SILVER</button></div><div id="colorResult" class="game-stats"></div>`;
            const cr=document.getElementById('colorResult');
            const check=(c)=> cr.innerHTML=(c==='red')?'✅ FASTEST LAP! +1':'❌ WRONG, red bull is red';
            document.getElementById('colorRed').onclick=()=>check('red');
            document.getElementById('colorBlue').onclick=()=>check('blue');
            document.getElementById('colorSilver').onclick=()=>check('silver');
        } }
    ];
    for(let g of miniGames) createGameCard(g.title, g.fn, `mg_${Math.random()}`);
</script>
</body>
</html>
