<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // GAMES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html" class="active">GAMES</a>
    </div>
    <h1>🎮 F1 MINI GAMES</h1>
    <div class="games-grid">
        <div class="game-card">
            <div class="game-title">⏱️ REACTION PIT STOP</div>
            <div>Click when light turns GREEN</div>
            <div id="pitStatus" style="margin:16px 0;font-size:18px;font-weight:800;">🔴 WAITING</div>
            <button id="pitBtn">START</button>
            <div id="pitResult" class="game-stats"></div>
        </div>
        <div class="game-card">
            <div class="game-title">🏁 LAP COUNTER</div>
            <div>Click as fast as possible (10 seconds)</div>
            <div id="lapCounter">0 clicks</div>
            <button id="lapBtn">START LAPS</button>
            <div id="lapResult" class="game-stats"></div>
        </div>
        <div class="game-card">
            <div class="game-title">🧠 DRIVER MEMORY</div>
            <div id="memoryQuestion">Press START to see a driver name</div>
            <button id="memoryBtn">START</button>
            <input type="text" id="memoryInput" placeholder="Type team name" style="background:#0b0e14;border:1px solid #ff003c;color:#fff;padding:8px;margin-top:12px;width:100%;">
            <button id="checkMemoryBtn" style="margin-top:8px;">CHECK</button>
            <div id="memoryResult" class="game-stats"></div>
        </div>
    </div>
    <div class="footer">ARCADE MODE · REACTION · SPEED · KNOWLEDGE</div>
</div>
<script>
    // GAME 1 - REACTION
    let pitTimer = null, pitStart = null, pitActive = false;
    const pitBtn = document.getElementById('pitBtn');
    const pitStatus = document.getElementById('pitStatus');
    const pitResult = document.getElementById('pitResult');
    pitBtn.onclick = () => {
        if (pitTimer) clearTimeout(pitTimer);
        pitActive = true;
        pitStatus.innerHTML = '🟢 GET READY...';
        pitResult.innerHTML = '';
        const delay = Math.random() * 3000 + 1000;
        pitTimer = setTimeout(() => {
            if (pitActive) {
                pitStatus.innerHTML = '🟢🟢 GO! CLICK NOW 🟢🟢';
                pitStart = Date.now();
            }
        }, delay);
        setTimeout(() => {
            if (pitActive && !pitStart) {
                pitStatus.innerHTML = '🔴 MISSED START';
                pitActive = false;
            }
        }, delay + 2000);
    };
    document.addEventListener('click', (e) => {
        if (pitActive && pitStart && e.target !== pitBtn) {
            const react = Date.now() - pitStart;
            pitStatus.innerHTML = `✅ REACTION: ${react} ms`;
            pitResult.innerHTML = react < 200 ? '🏆 WORLD CLASS' : '🔄 GOOD BUT SLOW';
            pitActive = false; pitStart = null;
            if (pitTimer) clearTimeout(pitTimer);
        }
    });
    // GAME 2 - LAP COUNTER
    let lapActive = false, lapCount = 0, lapInterval = null;
    const lapBtn = document.getElementById('lapBtn');
    const lapCounter = document.getElementById('lapCounter');
    const lapResult = document.getElementById('lapResult');
    lapBtn.onclick = () => {
        if (lapInterval) clearInterval(lapInterval);
        lapCount = 0;
        lapCounter.innerText = '0 clicks';
        lapResult.innerHTML = '';
        lapActive = true;
        let timeLeft = 10;
        lapResult.innerHTML = `⏱️ ${timeLeft} sec left`;
        lapInterval = setInterval(() => {
            timeLeft--;
            lapResult.innerHTML = `⏱️ ${timeLeft} sec left`;
            if (timeLeft <= 0) {
                clearInterval(lapInterval);
                lapActive = false;
                lapResult.innerHTML = `✅ FINISHED: ${lapCount} laps (clicks)`;
            }
        }, 1000);
    };
    document.addEventListener('click', (e) => {
        if (lapActive && e.target !== lapBtn) {
            lapCount++;
            lapCounter.innerText = `${lapCount} clicks`;
        }
    });
    // GAME 3 - MEMORY
    const driversMap = { 'max verstappen': 'red bull', 'lewis hamilton': 'ferrari', 'lando norris': 'mclaren', 'charles leclerc': 'ferrari', 'george russell': 'mercedes', 'oscar piastri': 'mclaren' };
    let currentDriver = '';
    const memoryBtn = document.getElementById('memoryBtn');
    const memoryQuestion = document.getElementById('memoryQuestion');
    const memoryInput = document.getElementById('memoryInput');
    const memoryResult = document.getElementById('memoryResult');
    memoryBtn.onclick = () => {
        const names = Object.keys(driversMap);
        currentDriver = names[Math.floor(Math.random() * names.length)];
        memoryQuestion.innerHTML = `🏎️ DRIVER: ${currentDriver.toUpperCase()}`;
        memoryInput.value = '';
        memoryResult.innerHTML = '';
    };
    document.getElementById('checkMemoryBtn').onclick = () => {
        if (!currentDriver) { memoryResult.innerHTML = '❌ PRESS START FIRST'; return; }
        const answer = memoryInput.value.trim().toLowerCase();
        const correct = driversMap[currentDriver];
        if (answer === correct) {
            memoryResult.innerHTML = '✅ CORRECT! +1 point';
        } else {
            memoryResult.innerHTML = `❌ WRONG. ${currentDriver} drives for ${correct.toUpperCase()}`;
        }
    };
</script>
</body>
</html>
