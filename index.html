<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // NEON DASH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #03050a, #000000);
            font-family: 'Inter', 'Segoe UI', monospace;
            color: #eef2ff;
            padding: 24px;
            line-height: 1.3;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .nav {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
            margin-bottom: 48px; padding: 8px 24px;
            border-bottom: 1px solid #ff003c;
            box-shadow: 0 0 6px #ff003c;
        }
        .nav a {
            color: #b0c4de; text-decoration: none; font-weight: 700; font-size: 14px;
            padding: 8px 24px; letter-spacing: 1px; transition: 0.2s;
            border-radius: 0px;
        }
        .nav a.active, .nav a:hover {
            background: #ff003c; color: #000; text-shadow: 0 0 4px #fff;
            box-shadow: 0 0 12px #ff003c;
        }
        h1 {
            font-size: 28px; font-weight: 800; margin-bottom: 28px;
            border-left: 4px solid #00c8ff; padding-left: 18px;
            text-shadow: 0 0 5px #00c8ff; letter-spacing: -0.5px;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px; margin-bottom: 48px;
        }
        .stat-card {
            background: #0b0e14; border: 1px solid #ff003c; padding: 24px;
            transition: 0.2s; box-shadow: 0 0 4px rgba(255,0,60,0.3);
        }
        .stat-card:hover { border-color: #00c8ff; box-shadow: 0 0 12px #00c8ff; transform: translateY(-2px); }
        .stat-label { font-size: 11px; text-transform: uppercase; color: #ff003c; letter-spacing: 2px; margin-bottom: 8px; }
        .stat-value { font-size: 34px; font-weight: 800; margin-bottom: 4px; text-shadow: 0 0 3px #fff; }
        .next-card {
            background: #0b0e14; border-left: 6px solid #ff003c; padding: 24px;
            margin-bottom: 32px; border-top: 1px solid #222;
        }
        .footer { margin-top: 64px; padding: 24px; text-align: center; border-top: 1px solid #ff003c; font-size: 11px; color: #6a7c94; }
        @media (max-width: 768px) { .stat-value { font-size: 26px; } .nav a { padding: 6px 14px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html" class="active">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
    </div>
    <h1>🔴 2026 SEASON // LIVE</h1>
    <div class="stats-grid" id="statsGrid"><div class="stat-card">⏳ LOADING DATA...</div></div>
    <div class="next-card" id="nextRaceBlock"><strong>⏱️ NEXT GRAND PRIX</strong><br>Fetching schedule...</div>
    <div class="footer">DATA FEED: JOLPICA API · UPDATES AFTER EACH SESSION</div>
</div>
<script>
    const SEASON = 2026;
    const API = `https://api.jolpi.ca/ergast/f1/${SEASON}`;
    async function getJSON(url) {
        try {
            const r = await fetch(url);
            if (!r.ok) throw new Error();
            return await r.json();
        } catch(e) { return null; }
    }
    async function load() {
        const drivers = await getJSON(`${API}/driverstandings.json`);
        let leader = '—', pts = 0, wins = 0;
        if (drivers?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings) {
            const top = drivers.MRData.StandingsTable.StandingsLists[0].DriverStandings[0];
            if (top) { leader = `${top.Driver.givenName} ${top.Driver.familyName}`; pts = top.points; wins = top.wins; }
        }
        const constr = await getJSON(`${API}/constructorstandings.json`);
        let cLeader = '—', cPts = 0;
        if (constr?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings) {
            const ct = constr.MRData.StandingsTable.StandingsLists[0].ConstructorStandings[0];
            if (ct) { cLeader = ct.Constructor.name; cPts = ct.points; }
        }
        const sched = await getJSON(`${API}.json`);
        let next = null;
        if (sched?.MRData?.RaceTable?.Races) {
            const now = new Date();
            for (let r of sched.MRData.RaceTable.Races) if (new Date(r.date) >= now) { next = r; break; }
            if (!next && sched.MRData.RaceTable.Races.length) next = sched.MRData.RaceTable.Races.slice(-1)[0];
        }
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-label">🏆 DRIVERS LEADER</div><div class="stat-value">${leader}</div><div>${pts} pts · ${wins} wins</div></div>
            <div class="stat-card"><div class="stat-label">🏭 CONSTRUCTORS LEADER</div><div class="stat-value">${cLeader}</div><div>${cPts} points</div></div>
            <div class="stat-card"><div class="stat-label">📅 TOTAL RACES</div><div class="stat-value">${sched?.MRData?.RaceTable?.Races?.length || 24}</div><div>2026 calendar</div></div>
            <div class="stat-card"><div class="stat-label">⏩ NEXT RACE</div><div class="stat-value">${next ? next.raceName : '—'}</div><div>${next ? new Date(next.date).toLocaleDateString('en-GB') : ''}</div></div>
        `;
        document.getElementById('nextRaceBlock').innerHTML = next ? `
            <strong>🔴 ${next.raceName}</strong><br>
            📍 ${next.Circuit.circuitName}, ${next.Circuit.Location?.country || ''}<br>
            📅 ${new Date(next.date).toLocaleDateString('en-GB', { weekday:'short', year:'numeric', month:'short', day:'numeric' })}
        ` : '<strong>🔴 SEASON FINISHED</strong>';
    }
    load();
</script>
</body>
</html>
