<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>F1 2026 | Red Bull Territory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #030507; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .nav {
            background: #0b0e14; border-radius: 80px; padding: 12px 28px; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-bottom: 48px; border: 1px solid rgba(225, 6, 0, 0.4);
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.2);
        }
        .nav a { color: #ccd6f0; text-decoration: none; font-weight: 700; padding: 8px 22px; border-radius: 40px; transition: 0.25s; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; box-shadow: 0 0 12px #e10600; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; margin-bottom: 48px; }
        .stat-card {
            background: #0f121b; border-radius: 28px; padding: 24px; border: 1px solid #1f2538;
            transition: 0.2s; backdrop-filter: blur(2px);
        }
        .stat-card:hover { transform: translateY(-4px); border-color: #e10600; box-shadow: 0 10px 20px -8px rgba(225,6,0,0.3); }
        .stat-label { font-size: 12px; text-transform: uppercase; color: #e10600; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 800; margin-bottom: 6px; }
        .next-race {
            background: linear-gradient(145deg, #0f121b, #080a10); border-radius: 32px; padding: 28px;
            margin-bottom: 32px; border-left: 6px solid #e10600; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .news-card { background: #0f121b; border-radius: 28px; padding: 24px; margin-bottom: 24px; border: 1px solid #1f2538; }
        .footer { margin-top: 60px; text-align: center; padding: 24px; border-top: 1px solid #1a1f2c; font-size: 12px; color: #6c7a92; }
        @media (max-width: 768px) { .stat-value { font-size: 24px; } .nav a { padding: 6px 14px; font-size: 13px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html" class="active">Главная</a>
        <a href="drivers.html">Гонщики</a>
        <a href="teams.html">Команды</a>
        <a href="calendar.html">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>
    <div class="stats-grid" id="statsGrid"><div class="stat-card">📡 ЗАГРУЗКА ДАННЫХ...</div></div>
    <div class="next-race" id="nextRaceBlock"><h2>🔴 СЛЕДУЮЩАЯ ГОНКА</h2><p>Загрузка...</p></div>
    <div id="newsBlock"></div>
    <div class="footer">F1 2026 — живые данные из Ergast API. Red Bull возвращается! 🐂🔥</div>
</div>
<script>
    const SEASON = 2026;
    const ERGAST_BASE = 'https://api.jolpi.ca/ergast/f1';
    async function fetchJSON(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) { console.error(e); return null; }
    }
    async function loadDashboard() {
        const driversData = await fetchJSON(`${ERGAST_BASE}/${SEASON}/driverstandings.json`);
        let leaderDriver = '—', leaderPoints = 0, leaderWins = 0;
        if (driversData?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings) {
            const top = driversData.MRData.StandingsTable.StandingsLists[0].DriverStandings[0];
            if (top) { leaderDriver = `${top.Driver.givenName} ${top.Driver.familyName}`; leaderPoints = top.points; leaderWins = top.wins; }
        }
        const constrData = await fetchJSON(`${ERGAST_BASE}/${SEASON}/constructorstandings.json`);
        let leaderTeam = '—', teamPoints = 0;
        if (constrData?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings) {
            const topTeam = constrData.MRData.StandingsTable.StandingsLists[0].ConstructorStandings[0];
            if (topTeam) { leaderTeam = topTeam.Constructor.name; teamPoints = topTeam.points; }
        }
        let rbPoints = 0;
        if (driversData?.MRData?.StandingsTable?.StandingsLists?.[0]?.DriverStandings) {
            const all = driversData.MRData.StandingsTable.StandingsLists[0].DriverStandings;
            const max = all.find(d => d.Driver.familyName === 'Verstappen');
            const hadjar = all.find(d => d.Driver.familyName === 'Hadjar');
            if (max) rbPoints += parseInt(max.points);
            if (hadjar) rbPoints += parseInt(hadjar.points);
        }
        const schedule = await fetchJSON(`${ERGAST_BASE}/${SEASON}.json`);
        let nextRace = null;
        if (schedule?.MRData?.RaceTable?.Races) {
            const races = schedule.MRData.RaceTable.Races;
            const now = new Date();
            for (let race of races) { if (new Date(race.date) >= now) { nextRace = race; break; } }
            if (!nextRace && races.length) nextRace = races[races.length - 1];
        }
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-label">🏆 ЛИДЕР ГОНЩИКОВ</div><div class="stat-value">${leaderDriver}</div><div>${leaderPoints} очков · ${leaderWins} побед</div></div>
            <div class="stat-card"><div class="stat-label">🏭 ЛИДЕР КОНСТРУКТОРОВ</div><div class="stat-value">${leaderTeam}</div><div>${teamPoints} очков</div></div>
            <div class="stat-card"><div class="stat-label">🐂 RED BULL (ОБА ПИЛОТА)</div><div class="stat-value">${rbPoints}</div><div>Верстаппен + Хаджар</div></div>
            <div class="stat-card"><div class="stat-label">📅 БЛИЖАЙШИЙ ЭТАП</div><div class="stat-value">${nextRace ? nextRace.raceName : '—'}</div><div>${nextRace ? new Date(nextRace.date).toLocaleDateString('ru-RU') : ''}</div></div>
        `;
        document.getElementById('nextRaceBlock').innerHTML = nextRace ? `
            <h2>🔴 ${nextRace.raceName} — ${nextRace.Circuit.circuitName}</h2>
            <p>${new Date(nextRace.date).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })} · ${nextRace.Circuit.Location?.country || ''}</p>
            <p>⏳ ГОНКА СКОРО! ОБНОВЛЯЙТЕ СТРАНИЦУ.</p>
        ` : '<h2>🔴 СЕЗОН ЗАВЕРШЁН</h2><p>Спасибо за яркий год!</p>';
        document.getElementById('newsBlock').innerHTML = `<div class="news-card"><h3>🔥 RED BULL RACING — СТАВКА НА БАКУ</h3><p>После обновлений и традиционно сильной трассы в Баку, Макс и Исак нацелены на подиум. Следи за таблицами!</p><p>🐂 Твой выбор — Red Bull, ты едешь в Баку!</p></div>`;
    }
    loadDashboard();
</script>
</body>
</html>
