<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — News</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7fc; color: #1a2c3e; padding: 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .nav {
            background: white; border-radius: 48px; padding: 12px 28px; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-bottom: 40px; border: 1px solid #e2e8f0;
        }
        .nav a { color: #1a2c3e; text-decoration: none; font-weight: 600; padding: 8px 22px; border-radius: 40px; transition: 0.2s; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; border-left: 4px solid #e10600; padding-left: 18px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .news-card {
            background: white; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0;
            transition: 0.2s; display: flex; flex-direction: column;
        }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .news-image { width: 100%; height: 180px; object-fit: cover; background: #e2e8f0; }
        .news-content { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .news-source { font-size: 11px; text-transform: uppercase; color: #e10600; font-weight: 700; margin-bottom: 8px; }
        .news-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .news-title a { color: #1a2c3e; text-decoration: none; }
        .news-title a:hover { color: #e10600; }
        .news-description { font-size: 14px; color: #5a6e84; line-height: 1.5; margin-bottom: 16px; }
        .news-date { font-size: 11px; color: #8a9bb0; margin-top: auto; }
        .footer { margin-top: 48px; text-align: center; padding: 24px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #5a6e84; }
        @media (max-width: 768px) { .news-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Standings</a>
        <a href="drivers.html">Drivers</a>
        <a href="teams.html">Teams</a>
        <a href="calendar.html">Calendar</a>
        <a href="news.html" class="active">News</a>
    </div>
    <h1>📰 LATEST F1 NEWS</h1>
    <div class="news-grid" id="newsGrid">
        <div style="grid-column:1/-1; text-align:center; padding:40px;">Loading latest headlines...</div>
    </div>
    <div class="footer">Aggregated via RSS · Sources include Motorsport, Autosport, F1 Technical</div>
</div>
<script>
    const RSS_FEEDS = [
        'https://www.motorsport.com/f1/news/rss/',
        'https://www.autosport.com/rss/feed/f1',
        'https://www.formula1.com/content/fom-website/en/latest/all.rss'
    ];
    async function fetchNews() {
        const container = document.getElementById('newsGrid');
        let allArticles = [];
        for (const feedUrl of RSS_FEEDS) {
            try {
                const proxyUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const data = await response.json();
                    if (data.items && data.items.length) {
                        const feedArticles = data.items.slice(0, 6).map(item => ({
                            title: item.title,
                            link: item.link,
                            pubDate: item.pubDate,
                            description: item.description?.replace(/<[^>]*>/g, '').substring(0, 200) + '...' || '',
                            thumbnail: item.enclosure?.link || item.thumbnail || null,
                            source: feedUrl.includes('motorsport') ? 'Motorsport' : (feedUrl.includes('autosport') ? 'Autosport' : 'Formula1.com')
                        }));
                        allArticles.push(...feedArticles);
                    }
                }
            } catch(e) { console.warn(`Failed to fetch ${feedUrl}`, e); }
        }
        allArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        allArticles = allArticles.slice(0, 24);
        if (allArticles.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Unable to load news. Please try again later.</div>';
            return;
        }
        container.innerHTML = '';
        allArticles.forEach(article => {
            const card = document.createElement('div');
            card.className = 'news-card';
            card.innerHTML = `
                ${article.thumbnail ? `<img class="news-image" src="${article.thumbnail}" alt="" onerror="this.style.display='none'">` : ''}
                <div class="news-content">
                    <div class="news-source">${article.source}</div>
                    <div class="news-title"><a href="${article.link}" target="_blank" rel="noopener noreferrer">${escapeHtml(article.title)}</a></div>
                    <div class="news-description">${escapeHtml(article.description)}</div>
                    <div class="news-date">${new Date(article.pubDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    fetchNews();
</script>
</body>
</html>
