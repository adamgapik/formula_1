<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 — команды</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #030507; color: #fff; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .nav {
            background: #0b0e14; border-radius: 80px; padding: 12px 28px; display: flex; flex-wrap: wrap;
            justify-content: center; gap: 20px; margin-bottom: 48px; border: 1px solid rgba(225, 6, 0, 0.4);
            box-shadow: 0 0 10px rgba(225, 6, 0, 0.2);
        }
        .nav a { color: #ccd6f0; text-decoration: none; font-weight: 700; padding: 8px 22px; border-radius: 40px; transition: 0.25s; }
        .nav a.active, .nav a:hover { background: #e10600; color: white; box-shadow: 0 0 12px #e10600; }
        .table-wrapper { overflow-x: auto; background: #0f121b; border-radius: 28px; padding: 4px; border: 1px solid #1f2538; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid #1f2538; }
        th { background: #0a0d14; color: #e10600; font-weight: 700; }
        .red-bull-row { background: rgba(225, 6, 0, 0.08); border-left: 3px solid #e10600; }
        .footer { margin-top: 60px; text-align: center; padding: 24px; border-top: 1px solid #1a1f2c; color: #6c7a92; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">Главная</a>
        <a href="drivers.html">Гонщики</a>
        <a href="teams.html" class="active">Команды</a>
        <a href="calendar.html">Календарь</a>
        <a href="baku.html">Гран-при Баку</a>
    </div>
    <h2 style="margin-bottom: 20px;">🏢 КУБОК КОНСТРУКТОРОВ 2026</h2>
    <div class="table-wrapper">
        <table id="teams-table">
            <thead><tr><th>Поз.</th><th>Команда</th><th>Победы</th><th>Очки</th></tr></thead>
            <tbody id="teams-tbody"><tr><td colspan="4">Загрузка...</td></tr></tbody>
        </table>
    </div>
    <div class="footer">Автообновление после каждого Гран-при.</div>
</div>
<script>
    const SEASON = 2026;
    async function fetchTeams() {
        const tbody = document.getElementById('teams-tbody');
        try {
            const res = await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/constructorstandings.json`);
            const data = await res.json();
            const standings = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || [];
            tbody.innerHTML = '';
            standings.forEach((t, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i+1;
                row.insertCell(1).innerText = t.Constructor.name;
                row.insertCell(2).innerText = t.wins;
                row.insertCell(3).innerText = t.points;
                if (t.Constructor.name === 'Red Bull' || t.Constructor.name === 'Red Bull Racing') row.classList.add('red-bull-row');
            });
        } catch(e) { tbody.innerHTML = '<tr><td colspan="4">Ошибка API</td></tr>'; }
    }
    fetchTeams();
</script>
</body>
</html>
