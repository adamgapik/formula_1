<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // TEAMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html" class="active">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
        <a href="games.html">GAMES</a>
    </div>
    <h1>🏢 CONSTRUCTORS</h1>
    <div class="table-wrapper">
        <table id="teamsTable">
            <thead><tr><th>POS</th><th>TEAM</th><th>WINS</th><th>POINTS</th></tr></thead>
            <tbody id="teamsBody"><tr><td colspan="4">⏳ LOADING</td></tr></tbody>
        </table>
    </div>
    <div class="footer">DATA: JOLPICA API · REAL TIME</div>
</div>
<script>
    const SEASON = 2026;
    async function loadTeams() {
        const tbody = document.getElementById('teamsBody');
        try {
            const res = await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/constructorstandings.json`);
            const data = await res.json();
            const list = data?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings || [];
            tbody.innerHTML = '';
            list.forEach((t, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = i + 1;
                row.insertCell(1).innerText = t.Constructor.name;
                row.insertCell(2).innerText = t.wins;
                row.insertCell(3).innerText = t.points;
            });
        } catch(e) { tbody.innerHTML = '<tr><td colspan="4">ERROR</td></tr>'; }
    }
    loadTeams();
</script>
</body>
</html>
