<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2026 // TEAMS</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#03050a;font-family:'Inter',monospace;color:#eef2ff;padding:24px;}
        .container{max-width:1300px;margin:0 auto;}
        .nav{
            display:flex;flex-wrap:wrap;justify-content:center;gap:12px;
            margin-bottom:48px;padding:8px 24px;border-bottom:1px solid #ff003c;
            box-shadow:0 0 6px #ff003c;
        }
        .nav a{color:#b0c4de;text-decoration:none;font-weight:700;padding:8px 24px;}
        .nav a.active,.nav a:hover{background:#ff003c;color:#000;box-shadow:0 0 12px #ff003c;}
        h1{font-size:28px;font-weight:800;margin-bottom:28px;border-left:4px solid #00c8ff;padding-left:18px;text-shadow:0 0 5px #00c8ff;}
        .table-wrapper{overflow-x:auto;background:#0b0e14;border:1px solid #ff003c;padding:2px;}
        table{width:100%;border-collapse:collapse;}
        th,td{padding:16px 14px;text-align:left;border-bottom:1px solid #22262f;}
        th{background:#05070c;color:#00c8ff;}
        .footer{margin-top:64px;padding:24px;text-align:center;border-top:1px solid #ff003c;font-size:11px;}
    </style>
</head>
<body>
<div class="container">
    <div class="nav">
        <a href="index.html">STANDINGS</a>
        <a href="drivers.html">DRIVERS</a>
        <a href="teams.html" class="active">TEAMS</a>
        <a href="calendar.html">CALENDAR</a>
        <a href="news.html">NEWS</a>
    </div>
    <h1>🏢 CONSTRUCTORS</h1>
    <div class="table-wrapper">
        <table id="teamsTable"><thead><tr><th>POS</th><th>TEAM</th><th>WINS</th><th>POINTS</th></tr></thead>
        <tbody id="teamsBody"><tr><td colspan="4">⏳ LOADING</td></tr></tbody></table>
    </div>
    <div class="footer">DATA: JOLPICA API · REAL TIME</div>
</div>
<script>
    const SEASON=2026;
    async function loadTeams(){
        const tbody=document.getElementById('teamsBody');
        try{
            const res=await fetch(`https://api.jolpi.ca/ergast/f1/${SEASON}/constructorstandings.json`);
            const data=await res.json();
            const list=data?.MRData?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings||[];
            tbody.innerHTML='';
            list.forEach((t,i)=>{
                const row=tbody.insertRow();
                row.insertCell(0).innerText=i+1;
                row.insertCell(1).innerText=t.Constructor.name;
                row.insertCell(2).innerText=t.wins;
                row.insertCell(3).innerText=t.points;
            });
        }catch(e){tbody.innerHTML='<tr><td colspan="4">ERROR</td></tr>';}
    }
    loadTeams();
</script>
</body>
</html>
